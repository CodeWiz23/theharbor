<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Harbor — Share & Heal</title>

    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://www.gstatic.com https://*.firebaseio.com 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        connect-src 'self' https://*.firebaseio.com https://*.googleapis.com;
    ">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>

    <style>
        /* ... (all styles as before) ... */
        /* Add style for datalist if needed */
        .modal-content input[list] { width:100%; padding:12px; border:2px solid #d4c8b8; border-radius:10px; }
    </style>
</head>
<body>
    <!-- ... (header, hero, search, tabs) ... -->

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">🔐 Welcome Back</h2>

            <div class="warning-box" id="genderWarning">
                <span class="icon">⚠️</span>
                <span id="genderWarningText">Your gender determines which sections you can see.</span>
            </div>

            <label for="authEmail">Email</label>
            <input type="email" id="authEmail" placeholder="you@example.com" />

            <label for="authPassword">Password</label>
            <input type="password" id="authPassword" placeholder="•••••••• (min 6 chars)" />
            <div id="passwordStrength"></div>

            <div id="signupFields" style="display:none;">
                <label for="authName">Username</label>
                <input type="text" id="authName" placeholder="Choose a unique username" />
                <div id="usernameStatus" style="font-size:0.85rem;margin-top:4px;"></div>

                <label for="authGender">Gender</label>
                <select id="authGender" onchange="updateGenderWarning()">
                    <option value="🧔 Man">🧔 Man</option>
                    <option value="👩 Woman">👩 Woman</option>
                    <option value="⚧️ Non-binary">⚧️ Non-binary</option>
                    <option value="🙅 Prefer not to say">🙅 Prefer not to say</option>
                </select>
                <div style="font-size:0.8rem;color:#7a9e7e;margin-top:4px;">
                    📌 Men see Men's Harbor. Women see Women's Harbor. The Storm, Sunny Skies, and The Compass are open to everyone.
                </div>

                <label for="authCountry">Country</label>
                <input type="text" id="authCountry" list="country-list" placeholder="Start typing your country..." autocomplete="off" />
                <datalist id="country-list"></datalist>

                <label for="authFavorites">Favorite things</label>
                <input type="text" id="authFavorites" placeholder="Hiking, reading, fishing..." />
            </div>

            <button class="btn-modal" id="authSubmitBtn" onclick="handleAuth()">🚀 Log In</button>

            <div class="switch-link" id="authSwitch" onclick="toggleAuthMode()">
                Don't have an account? <strong>Sign Up</strong>
            </div>

            <div class="error-msg" id="authError"></div>
            <div class="success-msg" id="authSuccess"></div>
        </div>
    </div>

    <!-- Rest of the page (stories container, footer, etc.) -->

    <script>
        // ============================================
        // FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBoYWOijOWqjd3d3_NAiSsiGmQ0HokaRGs",
            authDomain: "the-harbor-community.firebaseapp.com",
            projectId: "the-harbor-community",
            storageBucket: "the-harbor-community.firebasestorage.app",
            messagingSenderId: "634248505303",
            appId: "1:634248505303:web:4eb16e6a9f97903420cd92"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ============================================
        // COUNTRY DATA
        // ============================================
        const countries = [
            { name: 'Afghanistan', emergency: '119' }, { name: 'Albania', emergency: '112' },
            { name: 'Algeria', emergency: '14' }, { name: 'Andorra', emergency: '112' },
            { name: 'Angola', emergency: '113' }, { name: 'Argentina', emergency: '911' },
            // ... include all countries from previous list
            { name: 'Zimbabwe', emergency: '112' }
        ];

        // Populate datalist
        function populateCountryDatalist() {
            const datalist = document.getElementById('country-list');
            if (!datalist) return;
            datalist.innerHTML = '';
            countries.forEach(c => {
                const option = document.createElement('option');
                option.value = c.name;
                datalist.appendChild(option);
            });
        }
        populateCountryDatalist();

        // ============================================
        // GLOBAL STATE
        // ============================================
        let currentUser = null;
        let currentUserData = null;
        let currentCategory = 'all';

        // ============================================
        // SECURITY: Input Sanitization
        // ============================================
        function sanitizeInput(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.textContent;
        }

        function escapeHTML(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;',
                '/': '&#x2F;',
                '`': '&#x60;',
                '=': '&#x3D;'
            };
            return String(text).replace(/[&<>"'/`=]/g, function(m) { return map[m]; });
        }

        // ============================================
        // PASSWORD STRENGTH
        // ============================================
        function checkPasswordStrength(password) {
            let score = 0;
            if (password.length >= 8) score += 20;
            if (/[A-Z]/.test(password)) score += 20;
            if (/[a-z]/.test(password)) score += 20;
            if (/[0-9]/.test(password)) score += 20;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) score += 20;
            const common = ['password', '123456', 'qwerty', 'abc123', 'letmein', 'welcome', 'admin'];
            if (!common.some(pwd => password.toLowerCase().includes(pwd))) score += 10;
            let strength = 'weak', color = '#c0392b';
            if (score >= 90) { strength = 'very-strong'; color = '#27ae60'; }
            else if (score >= 70) { strength = 'strong'; color = '#2ecc71'; }
            else if (score >= 50) { strength = 'medium'; color = '#f39c12'; }
            else if (score >= 30) { strength = 'weak'; color = '#e67e22'; }
            else { strength = 'very-weak'; color = '#c0392b'; }
            return { score, strength, color };
        }

        // ============================================
        // USERNAME AVAILABILITY
        // ============================================
        function checkUsernameAvailability(username) {
            if (!username || username.length < 2) return Promise.resolve(false);
            return db.collection('users').where('name', '==', username).get().then(s => s.empty);
        }

        async function checkUsernameOnType() {
            const nameInput = document.getElementById('authName');
            const statusDiv = document.getElementById('usernameStatus');
            if (!nameInput || !statusDiv) return;
            const username = nameInput.value.trim();
            if (username.length < 2) { statusDiv.innerHTML = ''; return; }
            const available = await checkUsernameAvailability(username);
            statusDiv.innerHTML = available ?
                `<span style="color:#27ae60;">✅ Username available!</span>` :
                `<span style="color:#c0392b;">❌ Username taken</span>`;
        }

        // ============================================
        // AUTH FUNCTIONS
        // ============================================
        function openModal(mode) {
            const modal = document.getElementById('authModal');
            if (!modal) return;
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const signupFields = document.getElementById('signupFields');
            const switchLink = document.getElementById('authSwitch');
            const error = document.getElementById('authError');
            const success = document.getElementById('authSuccess');
            const warning = document.getElementById('genderWarning');

            if (error) error.textContent = '';
            if (success) success.textContent = '';

            document.getElementById('authEmail').value = '';
            document.getElementById('authPassword').value = '';
            document.getElementById('authName').value = '';
            document.getElementById('authFavorites').value = '';
            document.getElementById('authCountry').value = '';
            document.getElementById('passwordStrength').innerHTML = '';
            document.getElementById('usernameStatus').innerHTML = '';

            if (mode === 'login') {
                title.textContent = '🔐 Welcome Back';
                submitBtn.textContent = '🚀 Log In';
                signupFields.style.display = 'none';
                if (warning) warning.classList.remove('show');
                switchLink.innerHTML = `Don't have an account? <strong>Sign Up</strong>`;
                switchLink.dataset.mode = 'signup';
            } else {
                title.textContent = '📝 Join The Harbor';
                submitBtn.textContent = '🚀 Create Account';
                signupFields.style.display = 'block';
                // Populate country datalist already populated
                setTimeout(updateGenderWarning, 100);
                switchLink.innerHTML = `Already have an account? <strong>Log In</strong>`;
                switchLink.dataset.mode = 'login';
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('authModal').style.display = 'none';
        }

        function toggleAuthMode() {
            const switchLink = document.getElementById('authSwitch');
            if (!switchLink) return;
            const mode = switchLink.dataset.mode;
            closeModal();
            setTimeout(() => openModal(mode), 200);
        }

        function updateGenderWarning() {
            const genderSelect = document.getElementById('authGender');
            const warning = document.getElementById('genderWarning');
            const text = document.getElementById('genderWarningText');
            if (!genderSelect) return;
            const gender = genderSelect.value;
            if (gender === '🧔 Man') {
                text.innerHTML = '⚠️ As a <strong>Man</strong>, you will only see <strong>Men\'s Harbor</strong> for gender-specific sections. Women\'s Harbor will be hidden. The Storm, Sunny Skies, and The Compass are open to everyone.';
                warning.classList.add('show');
            } else if (gender === '👩 Woman') {
                text.innerHTML = '⚠️ As a <strong>Woman</strong>, you will only see <strong>Women\'s Harbor</strong> for gender-specific sections. Men\'s Harbor will be hidden. The Storm, Sunny Skies, and The Compass are open to everyone.';
                warning.classList.add('show');
            } else {
                text.innerHTML = '⚠️ You will only see <strong>The Storm, Sunny Skies, and The Compass</strong>. Men\'s and Women\'s Harbors are restricted based on gender.';
                warning.classList.add('show');
            }
        }

        function handleAuth() {
            const emailInput = document.getElementById('authEmail');
            const passwordInput = document.getElementById('authPassword');
            const error = document.getElementById('authError');
            const success = document.getElementById('authSuccess');
            const submitBtn = document.getElementById('authSubmitBtn');

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (error) error.textContent = '';
            if (success) success.textContent = '';

            if (!email || !email.includes('@') || !email.includes('.')) {
                if (error) error.textContent = 'Please enter a valid email address.';
                return;
            }
            if (!password || password.length < 6) {
                if (error) error.textContent = 'Password must be at least 6 characters.';
                return;
            }

            const isLogin = submitBtn.textContent.includes('Log In');

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Please wait...';

            if (isLogin) {
                // LOGIN
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        const user = userCredential.user;
                        if (!user.emailVerified) {
                            error.textContent = '⚠️ Please verify your email before logging in. Check your inbox!';
                            auth.signOut();
                            submitBtn.disabled = false;
                            submitBtn.textContent = '🚀 Log In';
                            success.innerHTML =
                                `Didn't get the email? <button class="resend-verification" onclick="resendVerification()">Resend verification</button>`;
                            return;
                        }
                        closeModal();
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Log In';
                        // Show welcome
                        setTimeout(() => {
                            if (typeof showWelcomeFireworks === 'function') showWelcomeFireworks();
                        }, 500);
                    })
                    .catch((err) => {
                        if (err.code === 'auth/user-not-found') {
                            error.textContent = 'No account found. Please sign up first.';
                        } else if (err.code === 'auth/wrong-password') {
                            error.textContent = 'Incorrect password. Please try again.';
                        } else if (err.code === 'auth/too-many-requests') {
                            error.textContent = 'Too many failed attempts. Try later.';
                        } else {
                            error.textContent = err.message;
                        }
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Log In';
                    });
            } else {
                // SIGNUP
                const nameInput = document.getElementById('authName');
                const genderSelect = document.getElementById('authGender');
                const favoritesInput = document.getElementById('authFavorites');
                const countryInput = document.getElementById('authCountry');

                const name = nameInput ? nameInput.value.trim() : '';
                const gender = genderSelect ? genderSelect.value : '🙅 Prefer not to say';
                const favorites = favoritesInput ? favoritesInput.value.trim() : '';
                const country = countryInput ? countryInput.value.trim() : '';

                if (!name || name.length < 2) {
                    error.textContent = 'Please enter a username (minimum 2 characters).';
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 Create Account';
                    return;
                }
                if (!country) {
                    error.textContent = 'Please select your country.';
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 Create Account';
                    return;
                }

                checkUsernameAvailability(name)
                    .then((available) => {
                        if (!available) {
                            error.textContent = '❌ Username is already taken.';
                            submitBtn.disabled = false;
                            submitBtn.textContent = '🚀 Create Account';
                            return Promise.reject('Username taken');
                        }
                        return auth.createUserWithEmailAndPassword(email, password);
                    })
                    .then((userCredential) => {
                        const user = userCredential.user;
                        return user.sendEmailVerification().then(() => user);
                    })
                    .then((user) => {
                        const countryData = countries.find(c => c.name === country);
                        return db.collection('users').doc(user.uid).set({
                            name: name,
                            email: email,
                            gender: gender,
                            favorites: favorites || 'Not specified',
                            country: country,
                            emergencyNumber: countryData?.emergency || '911',
                            emailVerified: false,
                            isAdmin: false,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            lastActive: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    })
                    .then(() => {
                        closeModal();
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Create Account';
                        auth.signOut();
                        alert('✅ Verification email sent to ' + email + '!\n\nPlease check your inbox and click the verification link.\n\nAfter verifying, log in to access The Harbor.');
                    })
                    .catch((err) => {
                        if (err !== 'Username taken') {
                            error.textContent = err.message;
                        }
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Create Account';
                    });
            }
        }

        function resendVerification() {
            const user = auth.currentUser;
            if (!user) {
                alert('Please log in first.');
                return;
            }
            user.sendEmailVerification()
                .then(() => alert('✅ Verification email resent!'))
                .catch((err) => alert('❌ Error: ' + err.message));
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                auth.signOut();
                window.location.href = 'index.html';
            }
        }

        // ============================================
        // AUTH STATE LISTENER
        // ============================================
        auth.onAuthStateChanged((user) => {
            const authButtons = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            const userName = document.getElementById('userName');
            const userGenderBadge = document.getElementById('userGenderBadge');
            const verificationBadge = document.getElementById('verificationBadge');

            if (user) {
                currentUser = user;
                authButtons.style.display = 'none';
                userInfo.style.display = 'flex';

                if (user.emailVerified) {
                    verificationBadge.textContent = '✅ Verified';
                    verificationBadge.className = 'verification-badge verified';
                } else {
                    verificationBadge.textContent = '⏳ Unverified';
                    verificationBadge.className = 'verification-badge';
                }

                db.collection('users').doc(user.uid).get()
                    .then((doc) => {
                        if (doc.exists) {
                            currentUserData = doc.data();
                            userName.textContent = currentUserData.name || 'Friend';
                            userGenderBadge.textContent = currentUserData.gender || '';

                            if (user.emailVerified && !currentUserData.emailVerified) {
                                db.collection('users').doc(user.uid).update({ emailVerified: true });
                            }

                            // Update category tabs based on gender
                            updateCategoryTabs();
                            // Load stories
                            loadStories();
                            // Update emergency banner
                            updateEmergencyBanner();
                        }
                    })
                    .catch((err) => console.error('Error fetching user data:', err));
            } else {
                currentUser = null;
                currentUserData = null;
                authButtons.style.display = 'flex';
                userInfo.style.display = 'none';
                // Reset tabs to show all (but restricted for guests)
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.classList.remove('hidden');
                    tab.classList.remove('restricted');
                });
                document.getElementById('genderRestrictionBanner').classList.remove('show');
                const container = document.getElementById('storiesContainer');
                if (container) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="big-emoji">⚓</div>
                            <h3>Welcome to The Harbor</h3>
                            <p>Log in or join to read and share stories.</p>
                        </div>
                    `;
                }
            }
        });

        // ============================================
        // GENDER RESTRICTIONS
        // ============================================
        function getUserGender() {
            if (!currentUserData) return null;
            return currentUserData.gender;
        }

        function canSeeCategory(category) {
            const gender = getUserGender();
            if (category === 'all' || category === 'struggles' || category === 'fun' || category === 'learning') return true;
            if (category === 'men' && gender === '🧔 Man') return true;
            if (category === 'women' && gender === '👩 Woman') return true;
            return false;
        }

        function canPostInCategory(category) {
            const gender = getUserGender();
            if (category === 'struggles' || category === 'fun' || category === 'learning') return true;
            if (category === 'men' && gender === '🧔 Man') return true;
            if (category === 'women' && gender === '👩 Woman') return true;
            return false;
        }

        function updateCategoryTabs() {
            const tabs = document.querySelectorAll('.tab');
            const gender = getUserGender();
            tabs.forEach(tab => {
                const cat = tab.dataset.category;
                if (cat === 'all' || cat === 'struggles' || cat === 'fun' || cat === 'learning') {
                    tab.classList.remove('hidden');
                } else if (cat === 'men') {
                    if (gender === '🧔 Man') tab.classList.remove('hidden');
                    else tab.classList.add('hidden');
                } else if (cat === 'women') {
                    if (gender === '👩 Woman') tab.classList.remove('hidden');
                    else tab.classList.add('hidden');
                }
            });
            updateRestrictionBanner();
        }

        function updateRestrictionBanner() {
            const banner = document.getElementById('genderRestrictionBanner');
            const text = document.getElementById('genderRestrictionText');
            if (!currentUserData) {
                banner.classList.remove('show');
                return;
            }
            const gender = currentUserData.gender;
            if (gender === '🧔 Man') {
                text.textContent = '🔒 You are a Man. You can view Men\'s Harbor. Women\'s Harbor is hidden. The Storm, Sunny Skies, and The Compass are open to everyone.';
                banner.classList.add('show');
            } else if (gender === '👩 Woman') {
                text.textContent = '🔒 You are a Woman. You can view Women\'s Harbor. Men\'s Harbor is hidden. The Storm, Sunny Skies, and The Compass are open to everyone.';
                banner.classList.add('show');
            } else {
                text.textContent = '🔒 You can view The Storm, Sunny Skies, and The Compass. Men\'s and Women\'s Harbors are restricted based on gender.';
                banner.classList.add('show');
            }
        }

        function updateEmergencyBanner() {
            const banner = document.getElementById('emergencyBanner');
            if (!banner || !currentUserData) return;
            const country = currentUserData.country;
            const emergency = currentUserData.emergencyNumber || '911';
            banner.innerHTML = `
                🆘 <strong>Emergency Number for ${country || 'your country'}:</strong>
                <a href="tel:${emergency}" style="color:#f5d6b3;font-weight:bold;text-decoration:underline;">${emergency}</a>
                ${country ? `(${country})` : ''}
            `;
            banner.style.display = 'block';
        }

        // ============================================
        // LOAD STORIES
        // ============================================
        function loadStories() {
            const container = document.getElementById('storiesContainer');
            if (!container) return;

            if (currentUser && !currentUser.emailVerified) {
                container.innerHTML = `
                    <div class="empty-state" style="background:#f5d6b3;border-radius:16px;padding:30px;border-left:4px solid #c47a5a;">
                        <div class="big-emoji">📧</div>
                        <h3>Email Not Verified</h3>
                        <p>Please check your email and click the verification link.</p>
                        <button class="btn-primary" onclick="resendVerification()" style="margin-top:12px;">🔄 Resend Verification</button>
                        <button class="btn-secondary" onclick="logout()" style="margin-top:10px;">Logout</button>
                    </div>
                `;
                return;
            }

            if (!canSeeCategory(currentCategory) && currentUser) {
                const gender = getUserGender();
                let msg = '🔒 You do not have permission to view this section.';
                if (gender === '🧔 Man') msg = '🔒 <strong>Men\'s Harbor</strong> is the only gender-specific section you can view. <strong>Women\'s Harbor</strong> is hidden.';
                else if (gender === '👩 Woman') msg = '🔒 <strong>Women\'s Harbor</strong> is the only gender-specific section you can view. <strong>Men\'s Harbor</strong> is hidden.';
                else msg = '🔒 You can view <strong>The Storm, Sunny Skies, and The Compass</strong>. Men\'s and Women\'s Harbors are restricted.';
                container.innerHTML = `
                    <div class="empty-state" style="background:#f5d6b3;border-radius:16px;padding:30px;border-left:4px solid #c47a5a;">
                        <div class="big-emoji">🔒</div>
                        <h3>Access Restricted</h3>
                        <p style="color:#2d3a3a;line-height:1.8;">${msg}</p>
                        <div style="margin-top:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
                            <a href="?cat=struggles" class="btn-primary" style="text-decoration:none;display:inline-block;padding:10px 24px;font-size:0.9rem;">🌊 The Storm</a>
                            <a href="?cat=fun" class="btn-primary" style="text-decoration:none;display:inline-block;padding:10px 24px;font-size:0.9rem;">☀️ Sunny Skies</a>
                            <a href="?cat=learning" class="btn-primary" style="text-decoration:none;display:inline-block;padding:10px 24px;font-size:0.9rem;">🧭 The Compass</a>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = '<div class="loading">⏳ Loading stories...</div>';

            let query = db.collection('stories')
                .where('approved', '==', true)
                .orderBy('createdAt', 'desc')
                .limit(50);

            if (currentCategory && currentCategory !== 'all') {
                query = query.where('category', '==', currentCategory);
            }

            query.get()
                .then((snapshot) => {
                    if (snapshot.empty) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="big-emoji">🌊</div>
                                <h3>No stories yet</h3>
                                <p>Be the first to share your story!</p>
                                ${canPostInCategory(currentCategory) ?
                                    `<a href="submit.html" class="btn-primary" style="display:inline-block;text-decoration:none;margin-top:12px;">📝 Share Your Story</a>`
                                    : ''
                                }
                            </div>
                        `;
                        return;
                    }

                    let html = '';
                    snapshot.forEach((doc) => {
                        const story = doc.data();
                        story.id = doc.id;
                        html += renderStoryCard(story);
                    });
                    container.innerHTML = html;
                })
                .catch((err) => {
                    console.error('Error loading stories:', err);
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="big-emoji">⚠️</div>
                            <h3>Oops!</h3>
                            <p>Could not load stories. Please try again.</p>
                        </div>
                    `;
                });
        }

        function renderStoryCard(story) {
            const author = story.isAnonymous ? '🕊️ Anonymous' : escapeHTML(story.authorName || 'Someone');
            const categoryNames = {
                'men': '🧔 Men\'s Harbor',
                'women': '👩 Women\'s Harbor',
                'struggles': '🌊 The Storm',
                'fun': '☀️ Sunny Skies',
                'learning': '🧭 The Compass'
            };
            const categoryDisplay = categoryNames[story.category] || story.category;

            const reactions = story.reactions || {};
            const emojis = ['❤️', '🙏', '😢', '💪', '🤗', '🌊', '🕊️', '👊'];

            let reactionButtons = '';
            emojis.forEach((emoji) => {
                const count = reactions[emoji] || 0;
                reactionButtons += `
                    <button class="emoji-btn" onclick="addReaction('${story.id}', '${emoji}')">
                        ${emoji} <span class="count">${count}</span>
                    </button>
                `;
            });

            const time = story.createdAt ? story.createdAt.toDate().toLocaleDateString() : 'Recently';
            const excerpt = story.text.length > 200 ? escapeHTML(story.text.substring(0, 200)) + '...' : escapeHTML(story.text);

            return `
                <div class="story-card" data-story-id="${story.id}">
                    <div class="story-title">${escapeHTML(story.title || 'Untitled')}</div>
                    <div class="story-meta">
                        <span>✍️ ${author}</span>
                        <span class="category-badge">${categoryDisplay}</span>
                        <span>📅 ${time}</span>
                    </div>
                    <div class="story-text">${excerpt}</div>
                    <div class="story-actions">
                        ${reactionButtons}
                        <a class="comment-link" href="story.html?id=${story.id}">💬 ${story.commentCount || 0} comments</a>
                    </div>
                </div>
            `;
        }

        // ============================================
        // EMOJI REACTIONS
        // ============================================
        function addReaction(storyId, emoji) {
            if (!currentUser) {
                alert('Please log in to react.');
                return;
            }
            if (!currentUser.emailVerified) {
                alert('Please verify your email first.');
                return;
            }
            const storyRef = db.collection('stories').doc(storyId);
            db.runTransaction((transaction) => {
                return transaction.get(storyRef).then((doc) => {
                    if (!doc.exists) return;
                    const data = doc.data();
                    const reactions = data.reactions || {};
                    reactions[emoji] = (reactions[emoji] || 0) + 1;
                    transaction.update(storyRef, { reactions: reactions });
                });
            })
            .then(() => loadStories())
            .catch((err) => {
                console.error('Error adding reaction:', err);
                alert('Could not add reaction.');
            });
        }

        // ============================================
        // CATEGORY SWITCHING
        // ============================================
        function switchCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.tab').forEach((tab) => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            loadStories();
        }

        // ============================================
        // SEARCH STORIES
        // ============================================
        function searchStories() {
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;
            const query = searchInput.value.toLowerCase().trim();
            if (!query) {
                loadStories();
                return;
            }

            const container = document.getElementById('storiesContainer');
            container.innerHTML = '<div class="loading">⏳ Searching...</div>';

            db.collection('stories')
                .where('approved', '==', true)
                .orderBy('createdAt', 'desc')
                .limit(100)
                .get()
                .then((snapshot) => {
                    if (snapshot.empty) {
                        container.innerHTML = `<div class="empty-state"><div class="big-emoji">🔍</div><h3>No stories found</h3><p>Try different keywords.</p></div>`;
                        return;
                    }
                    let matched = [];
                    snapshot.forEach((doc) => {
                        const story = doc.data();
                        story.id = doc.id;
                        const searchText = (story.title + ' ' + story.text + ' ' + story.authorName).toLowerCase();
                        if (searchText.includes(query) && canSeeCategory(story.category)) {
                            matched.push(story);
                        }
                    });
                    if (matched.length === 0) {
                        container.innerHTML = `<div class="empty-state"><div class="big-emoji">🔍</div><h3>No stories match "${escapeHTML(query)}"</h3><p>Try different keywords.</p></div>`;
                        return;
                    }
                    let html = '';
                    matched.forEach((story) => { html += renderStoryCard(story); });
                    container.innerHTML = html;
                })
                .catch((err) => {
                    console.error('Search error:', err);
                    loadStories();
                });
        }

        // ============================================
        // WELCOME FIREWORKS (simplified)
        // ============================================
        function showWelcomeFireworks() {
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position:fixed; top:0; left:0; width:100%; height:100%;
                background:rgba(26,74,74,0.9); z-index:99999;
                display:flex; justify-content:center; align-items:center;
                flex-direction:column; color:white;
                animation: fadeIn 0.5s ease;
            `;
            overlay.innerHTML = `
                <style>
                    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
                    .confetti { position:fixed; width:10px; height:10px; border-radius:50%; pointer-events:none; animation: fall 2s linear forwards; z-index:100000; }
                    @keyframes fall { 0% { transform: translateY(-100px) rotate(0deg); opacity:1; } 100% { transform: translateY(100vh) rotate(720deg); opacity:0; } }
                </style>
                <span style="font-size:4rem;">🎉</span>
                <h1 style="font-size:3rem;font-weight:300;">Welcome to <span style="font-weight:700;color:#c47a5a;">The Harbor</span></h1>
                <p style="font-size:1.2rem;opacity:0.8;">⚓ A safe place to share, heal, and grow</p>
                <button onclick="this.parentElement.remove()" style="margin-top:30px;padding:14px 40px;background:#c47a5a;border:none;border-radius:50px;color:white;font-size:1.1rem;font-weight:700;cursor:pointer;">Continue</button>
            `;
            document.body.appendChild(overlay);

            // Confetti
            const colors = ['#ff6b6b','#feca57','#54a0ff','#5f27cd','#ff9ff3','#00d2d3','#ff9f43','#ee5a24'];
            for (let i=0; i<60; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random()*100 + '%';
                el.style.top = '-20px';
                el.style.background = colors[Math.floor(Math.random()*colors.length)];
                el.style.width = (6+Math.random()*10) + 'px';
                el.style.height = (6+Math.random()*10) + 'px';
                el.style.animationDuration = (2+Math.random()*3) + 's';
                el.style.animationDelay = (Math.random()*2) + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 5000);
            }
            setTimeout(() => overlay.remove(), 8000);
        }

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOM Ready');

            // Modal close on outside click
            document.getElementById('authModal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            // Password strength
            document.getElementById('authPassword').addEventListener('input', function() {
                const pwd = this.value;
                const strengthDiv = document.getElementById('passwordStrength');
                if (!strengthDiv) return;
                if (pwd.length === 0) { strengthDiv.innerHTML = ''; return; }
                const result = checkPasswordStrength(pwd);
                strengthDiv.innerHTML = `
                    <div style="margin-top:6px;font-size:0.85rem;">
                        Strength: <span style="color:${result.color};font-weight:700;">${result.strength}</span>
                    </div>
                `;
            });

            // Username availability
            document.getElementById('authName').addEventListener('input', checkUsernameOnType);

            // Gender warning on signup
            document.getElementById('authGender').addEventListener('change', updateGenderWarning);

            // Enter key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const modal = document.getElementById('authModal');
                    if (modal && modal.style.display === 'flex') handleAuth();
                }
            });

            // Set initial category from URL
            const urlParams = new URLSearchParams(window.location.search);
            const cat = urlParams.get('cat');
            if (cat) {
                currentCategory = cat;
                document.querySelectorAll('.tab').forEach((tab) => {
                    tab.classList.toggle('active', tab.dataset.category === cat);
                });
            }

            // Load stories if not logged in (will be called on auth change)
            // If user is already logged in, auth listener will load stories.
            console.log('✅ App ready');
        });

        console.log('⚓ The Harbor app loaded');
        console.log('📚 Firebase connected:', firebase.app().name);
    </script>
</body>
</html>
