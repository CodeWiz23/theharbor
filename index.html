<script>
// ============================================
// INDEX PAGE - ALL FIXES
// ============================================
var reactionLocks = {};

// CRITICAL: Define viewProfile FIRST
function viewProfile(userId) {
    if (userId) {
        window.location.href = 'profile.html?uid=' + userId;
    }
}

function applyGuestRestrictions() {
    var isLoggedIn = (typeof currentUser !== 'undefined' && currentUser !== null && currentUser !== false);
    document.querySelectorAll('.guest-only').forEach(function(el) { el.style.display = isLoggedIn ? '' : 'none'; });
    document.querySelectorAll('.auth-only').forEach(function(el) { el.style.display = isLoggedIn ? 'none' : ''; });
    var guestMsg = document.getElementById('guestMessage');
    if (guestMsg) guestMsg.style.display = isLoggedIn ? 'none' : 'block';
    var userInfo = document.getElementById('userInfo');
    if (userInfo) userInfo.style.display = isLoggedIn ? 'flex' : 'none';
    if (!isLoggedIn) {
        var container = document.getElementById('storiesContainer');
        if (container) {
            container.innerHTML = '<div class="empty-state" style="padding:40px;background:var(--bg-card);border-radius:var(--radius-lg);border:1px solid var(--border-color);"><div class="big-emoji">🔒</div><h3>Login Required</h3><p style="color:var(--text-muted);">Please log in or join to read and share stories.</p><div style="margin-top:14px;display:flex;gap:10px;justify-content:center;"><button class="btn btn-primary" onclick="openModal(\'login\')">🔐 Log In</button><button class="btn btn-secondary" onclick="openModal(\'signup\')">📝 Join</button></div></div>';
        }
    }
}

function updateGenderTabs() {
    if (!currentUserData) return;
    var gender = currentUserData.gender;
    var tabMen = document.getElementById('tabMen');
    var tabWomen = document.getElementById('tabWomen');
    if (tabMen) tabMen.style.display = (gender === '🧔 Man') ? '' : 'none';
    if (tabWomen) tabWomen.style.display = (gender === '👩 Woman') ? '' : 'none';
}

function renderStoryCard(story) {
    var author = story.isAnonymous ? '🕊️ Anonymous' : escapeHTML(story.authorName || 'Someone');
    var initial = (story.authorName || 'A')[0].toUpperCase();
    var timeStr = 'Recently';
    if (story.createdAt) {
        var d = story.createdAt.toDate();
        timeStr = d.toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
    }
    var catNames = {men:"🧔 Men's Harbor",women:"👩 Women's Harbor",struggles:'🌊 The Storm',fun:'☀️ Sunny Skies',learning:'🧭 The Compass'};
    var catDisp = catNames[story.category] || story.category;
    var badges = '';
    if (story.visibility === 'private') badges += '<span class="badge-visibility private">🔒 Private</span>';
    if (story.goldReceived > 0) badges += '<span class="badge-gold">'+story.goldReceived+' 🪙</span>';
    if (currentUser && story.userId === currentUser.uid) badges += '<span class="badge-yours">👤 Yours</span>';
    var text = story.text || '';
    var showMore = text.length > 200;
    var excerpt = showMore ? escapeHTML(text.substring(0, 200)) + '...' : escapeHTML(text);
    var reactions = story.reactions || {};
    var emojis = ['❤️','🙏','😢','💪','🤗'];
    var reactionBtns = '';
    emojis.forEach(function(emoji) {
        var count = reactions[emoji] || 0;
        var hasReacted = userReactions[story.id] && userReactions[story.id].indexOf(emoji) !== -1;
        var lockKey = story.id+'_'+emoji;
        var locked = reactionLocks[lockKey];
        reactionBtns += '<button class="reaction-mini'+(hasReacted?' reacted':'')+'" id="reaction-'+story.id+'-'+emoji+'" onclick="indexToggleReaction(\''+story.id+'\',\''+emoji+'\')" '+(locked?'disabled':'')+'>'+emoji+' <span class="count" id="count-'+story.id+'-'+emoji+'">'+count+'</span></button>';
    });
    var isOwner = currentUser && story.userId === currentUser.uid;

    // FIXED: Avatar and name use onclick with proper function call and stopPropagation
    return '<div class="story-card" data-story-id="'+story.id+'">'+
        '<div class="story-card-top">'+
            '<div class="story-card-avatar" onclick="event.stopPropagation();event.preventDefault();viewProfile(\''+story.userId+'\');return false;">'+initial+'</div>'+
            '<div class="story-card-author-info">'+
                '<div class="story-card-author-name" onclick="event.stopPropagation();event.preventDefault();viewProfile(\''+story.userId+'\');return false;">'+author+'</div>'+
                '<div class="story-card-time">📅 '+timeStr+'</div>'+
            '</div>'+
            '<div class="story-card-badges">'+badges+'</div>'+
        '</div>'+
        '<div class="story-card-title" onclick="window.location.href=\'story.html?id='+story.id+'\'">'+escapeHTML(story.title || 'Untitled')+'</div>'+
        '<span class="story-card-category">'+catDisp+'</span>'+
        '<div class="story-card-excerpt">'+excerpt+'</div>'+
        (showMore ? '<button class="story-card-readmore" onclick="event.stopPropagation();indexToggleReadMore(\''+story.id+'\')">Read More ▼</button><div class="story-card-full" id="fullContent-'+story.id+'">'+escapeHTML(text.substring(200))+'</div>' : '')+
        '<div class="story-card-actions">'+
            reactionBtns+
            '<a class="card-action-btn card-btn-comment" href="story.html?id='+story.id+'">💬 '+(story.commentCount||0)+'</a>'+
            (isOwner ? '<button class="card-action-btn card-btn-edit" onclick="event.stopPropagation();openEditModal(\''+story.id+'\')">✏️</button>' : '')+
            (isOwner ? '<button class="card-action-btn card-btn-delete" onclick="event.stopPropagation();deleteStory(\''+story.id+'\')">🗑️</button>' : '')+
            (isOwner ? '<button class="card-action-btn card-btn-visibility '+(story.visibility==='private'?'private':'')+'" onclick="event.stopPropagation();toggleVisibility(\''+story.id+'\')">'+(story.visibility==='public'?'🔒':'🌍')+'</button>' : '')+
            (currentUser && story.userId !== currentUser.uid ? '<button class="card-action-btn card-btn-gold" onclick="event.stopPropagation();openGoldModal(\''+story.id+'\')">🪙 Donate</button>' : '')+
            (currentUser ? '<button class="card-action-btn card-btn-report" onclick="event.stopPropagation();reportStory(\''+story.id+'\')">🚩</button>' : '')+
        '</div>'+
    '</div>';
}

function indexToggleReadMore(storyId) {
    var full = document.getElementById('fullContent-'+storyId);
    var btn = full ? full.previousElementSibling : null;
    if (!full) return;
    if (full.classList.contains('show')) { full.classList.remove('show'); if(btn) btn.textContent = 'Read More ▼'; }
    else { full.classList.add('show'); if(btn) btn.textContent = 'Show Less ▲'; }
}

function indexToggleReaction(storyId, emoji) {
    if (!currentUser) { alert('Please log in to react.'); return; }
    if (!currentUser.emailVerified) { alert('Please verify your email first.'); return; }
    var lockKey = storyId+'_'+emoji;
    if (reactionLocks[lockKey]) return;
    reactionLocks[lockKey] = true;
    if (!userReactions[storyId]) userReactions[storyId] = [];
    var storyRef = db.collection('stories').doc(storyId);
    var userReactionRef = db.collection('users').doc(currentUser.uid).collection('reactions').doc(storyId);
    var hasReacted = userReactions[storyId].indexOf(emoji) !== -1;
    var btn = document.getElementById('reaction-'+storyId+'-'+emoji);
    if (btn) btn.disabled = true;
    db.runTransaction(function(transaction) {
        return transaction.get(storyRef).then(function(doc) {
            if (!doc.exists) return;
            var data = doc.data();
            var reactions = data.reactions || {};
            if (hasReacted) { reactions[emoji] = Math.max((reactions[emoji]||0)-1,0); userReactions[storyId] = userReactions[storyId].filter(function(e){return e!==emoji;}); }
            else { reactions[emoji] = (reactions[emoji]||0)+1; userReactions[storyId].push(emoji); }
            transaction.update(storyRef, {reactions:reactions});
            transaction.set(userReactionRef, {emojis:userReactions[storyId],timestamp:firebase.firestore.FieldValue.serverTimestamp(),storyId:storyId},{merge:true});
        });
    }).then(function() {
        if (btn) btn.disabled = false;
        var countSpan = document.getElementById('count-'+storyId+'-'+emoji);
        if (countSpan) countSpan.textContent = hasReacted ? (parseInt(countSpan.textContent)||0)-1 : (parseInt(countSpan.textContent)||0)+1;
        if (btn) { if (hasReacted) btn.classList.remove('reacted'); else btn.classList.add('reacted'); }
        reactionLocks[lockKey] = false;
    }).catch(function(err) {
        console.error('Reaction error:', err);
        if (btn) btn.disabled = false;
        reactionLocks[lockKey] = false;
    });
}

document.addEventListener('DOMContentLoaded', function() {
    // Make viewProfile globally accessible
    window.viewProfile = viewProfile;
    
    var check = setInterval(function() {
        if (typeof currentUser !== 'undefined') { clearInterval(check); applyGuestRestrictions(); updateGenderTabs(); if (currentUser && typeof loadStories === 'function') loadStories(); }
    }, 100);
    if (typeof auth !== 'undefined') {
        auth.onAuthStateChanged(function(user) { setTimeout(function(){applyGuestRestrictions();updateGenderTabs();if(user&&typeof loadStories==='function')loadStories();},300); });
    }
    setTimeout(function() { if (typeof currentUser !== 'undefined') applyGuestRestrictions(); }, 2000);
    document.getElementById('authModal')?.addEventListener('click', function(e) { if(e.target===this)closeModal(); });
    document.getElementById('editModal')?.addEventListener('click', function(e) { if(e.target===this)closeEditModal(); });
    document.getElementById('authPassword')?.addEventListener('input', function() {
        var sd = document.getElementById('passwordStrength');
        if (!sd || !this.value) { if(sd) sd.innerHTML=''; return; }
        if (typeof checkPasswordStrength === 'function') {
            var r = checkPasswordStrength(this.value);
            sd.innerHTML = '<div style="margin-top:6px;font-size:0.85rem;">Strength: <span style="color:'+r.color+';font-weight:700;">'+r.strength+'</span></div>';
        }
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { var m = document.getElementById('authModal'); if(m&&m.classList.contains('active'))handleAuth(); }
        if (e.key === 'Escape') { closeModal(); closeEditModal(); }
    });
    console.log('✅ Index page ready');
});
</script>
