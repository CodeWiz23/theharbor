<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome — The Harbor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a4a4a, #2d6a6a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .welcome-container {
            text-align: center;
            color: #f5f0eb;
            animation: fadeIn 1s ease;
            z-index: 10;
            padding: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        .welcome-container .emoji {
            font-size: 5rem;
            display: block;
            margin-bottom: 16px;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .welcome-container h1 {
            font-size: 3.5rem;
            font-weight: 300;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .welcome-container h1 span {
            font-weight: 700;
            color: #c47a5a;
        }
        .welcome-container p {
            font-size: 1.2rem;
            opacity: 0.85;
            margin-top: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.15);
        }
        .btn-primary {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 44px;
            background: #c47a5a;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(196, 122, 90, 0.4);
        }
        .btn-primary:hover { 
            transform: scale(1.05) translateY(-3px); 
            background: #a85a3a;
            box-shadow: 0 6px 30px rgba(196, 122, 90, 0.5);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        /* Fireworks particles */
        .firework {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            animation: firework 2s ease-out forwards;
            z-index: 1;
        }
        @keyframes firework {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        
        /* Sparkle particles */
        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 3s ease-out forwards;
            z-index: 2;
        }
        @keyframes sparkle {
            0% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(0) rotate(720deg); }
        }
        
        /* Star particles */
        .star {
            position: fixed;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: twinkle 2s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .welcome-container h1 {
                font-size: 2.5rem;
            }
            .welcome-container .emoji {
                font-size: 4rem;
            }
            .welcome-container p {
                font-size: 1rem;
            }
            .btn-primary {
                padding: 12px 32px;
                font-size: 1rem;
            }
        }
        @media (max-width: 400px) {
            .welcome-container h1 {
                font-size: 1.8rem;
            }
            .welcome-container .emoji {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background stars -->
    <div id="stars"></div>

    <div class="welcome-container">
        <span class="emoji">🎉</span>
        <h1>Welcome to <span>The Harbor</span></h1>
        <p>⚓ A safe place to share, heal, and grow</p>
        <a href="index.html" class="btn-primary">Continue to The Harbor →</a>
    </div>

    <script>
        // ============================================
        // FIREWORKS EFFECT
        // ============================================
        
        // Color palette
        const colors = [
            '#ff6b6b', '#feca57', '#54a0ff', '#5f27cd', 
            '#ff9ff3', '#00d2d3', '#ff9f43', '#ee5a24', 
            '#27ae60', '#f39c12', '#e74c3c', '#3498db',
            '#9b59b6', '#1abc9c', '#e67e22', '#2ecc71'
        ];

        // Create background stars
        function createStars() {
            const container = document.getElementById('stars');
            if (!container) return;
            
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (1 + Math.random() * 3) + 'px';
                star.style.height = (1 + Math.random() * 3) + 'px';
                star.style.animationDelay = (Math.random() * 3) + 's';
                star.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // Create a single firework burst
        function createFirework() {
            const cx = 50 + Math.random() * (window.innerWidth - 100);
            const cy = 20 + Math.random() * (window.innerHeight * 0.5);
            const color = colors[Math.floor(Math.random() * colors.length)];
            const count = 25 + Math.floor(Math.random() * 45);
            const isLarge = Math.random() > 0.7;

            // Main particles
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'firework';
                const angle = Math.random() * Math.PI * 2;
                const distance = (isLarge ? 80 : 50) + Math.random() * (isLarge ? 250 : 150);
                el.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                el.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                el.style.background = color;
                el.style.left = cx + 'px';
                el.style.top = cy + 'px';
                el.style.width = (3 + Math.random() * 9) + 'px';
                el.style.height = (3 + Math.random() * 9) + 'px';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                el.style.animationDuration = (1.2 + Math.random() * 1.2) + 's';
                el.style.boxShadow = `0 0 10px ${color}40`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2500);
            }

            // Sparkles (trails)
            for (let i = 0; i < 8 + Math.random() * 12; i++) {
                const el = document.createElement('div');
                el.className = 'sparkle';
                const angle = Math.random() * Math.PI * 2;
                const distance = 20 + Math.random() * 80;
                el.style.left = (cx + Math.cos(angle) * distance) + 'px';
                el.style.top = (cy + Math.sin(angle) * distance) + 'px';
                el.style.width = (1 + Math.random() * 4) + 'px';
                el.style.height = (1 + Math.random() * 4) + 'px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                el.style.boxShadow = `0 0 6px ${color}80`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 3500);
            }

            // Additional glow effect (larger for large fireworks)
            if (isLarge) {
                for (let i = 0; i < 5; i++) {
                    const el = document.createElement('div');
                    el.className = 'firework';
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 30 + Math.random() * 60;
                    el.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                    el.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                    el.style.background = 'rgba(255,255,255,0.3)';
                    el.style.left = cx + 'px';
                    el.style.top = cy + 'px';
                    el.style.width = (6 + Math.random() * 10) + 'px';
                    el.style.height = (6 + Math.random() * 10) + 'px';
                    el.style.animationDuration = (1 + Math.random() * 0.5) + 's';
                    el.style.filter = 'blur(4px)';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 1500);
                }
            }
        }

        // Create a sequence of fireworks
        function createFireworkSequence() {
            const count = 2 + Math.floor(Math.random() * 4);
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    createFirework();
                }, i * 150 + Math.random() * 100);
            }
        }

        // Launch fireworks at intervals
        let fireworkInterval = setInterval(createFireworkSequence, 500);

        // Also launch on click/tap
        document.addEventListener('click', function(e) {
            // Create multiple bursts on click
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    createFirework();
                }, i * 100);
            }
        });

        document.addEventListener('touchstart', function(e) {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    createFirework();
                }, i * 100);
            }
        });

        // Stop automatic fireworks after 10 seconds
        setTimeout(() => {
            clearInterval(fireworkInterval);
            // One final grand finale
            setTimeout(() => {
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => {
                        createFirework();
                    }, i * 120);
                }
            }, 500);
        }, 10000);

        // Resize handler - update stars if needed
        window.addEventListener('resize', function() {
            // Nothing needed, stars are positioned with %
        });

        console.log('🎆 Welcome fireworks started!');
        console.log('✨ Click anywhere for more fireworks!');
    </script>
</body>
</html>
