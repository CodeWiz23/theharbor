            { code: 'TR', name: 'Turkey', emergency: '112', note: 'General Emergency' },
            { code: 'TM', name: 'Turkmenistan', emergency: '112', note: 'General Emergency' },
            { code: 'TV', name: 'Tuvalu', emergency: '112', note: 'General Emergency' },
            { code: 'UG', name: 'Uganda', emergency: '112', note: 'General Emergency' },
            { code: 'UA', name: 'Ukraine', emergency: '112', note: 'General Emergency' },
            { code: 'AE', name: 'United Arab Emirates', emergency: '999', note: 'General Emergency' },
            { code: 'GB', name: 'United Kingdom', emergency: '999', note: 'Police, Fire, Ambulance' },
            { code: 'US', name: 'United States', emergency: '911', note: 'Police, Fire, Ambulance' },
            { code: 'UY', name: 'Uruguay', emergency: '911', note: 'General Emergency' },
            { code: 'UZ', name: 'Uzbekistan', emergency: '112', note: 'General Emergency' },
            { code: 'VU', name: 'Vanuatu', emergency: '112', note: 'General Emergency' },
            { code: 'VA', name: 'Vatican City', emergency: '112', note: 'General Emergency' },
            { code: 'VE', name: 'Venezuela', emergency: '911', note: 'General Emergency' },
            { code: 'VN', name: 'Vietnam', emergency: '113', note: 'Police / 114 Fire / 115 Ambulance' },
            { code: 'YE', name: 'Yemen', emergency: '112', note: 'General Emergency' },
            { code: 'ZM', name: 'Zambia', emergency: '112', note: 'General Emergency' },
            { code: 'ZW', name: 'Zimbabwe', emergency: '112', note: 'General Emergency' }
        ];

        // ============================================
        // DOM REFERENCES
        // ============================================
        const searchInput = document.getElementById('countrySearch');
        const dropdown = document.getElementById('dropdown');
        const resultCard = document.getElementById('resultCard');
        const noResult = document.getElementById('noResult');

        // ============================================
        // SEARCH FUNCTIONS
        // ============================================
        function searchCountry(name) {
            if (!name) return;
            searchInput.value = name;
            const result = countries.find(c => c.name.toLowerCase() === name.toLowerCase());
            if (result) {
                showResult(result);
            } else {
                resultCard.style.display = 'none';
                noResult.style.display = 'block';
            }
            dropdown.classList.remove('show');
        }

        function showResult(result) {
            const countryEl = document.getElementById('resultCountry');
            const numberEl = document.getElementById('resultNumber');
            const noteEl = document.getElementById('resultNote');
            const callBtn = document.getElementById('callBtn');
            
            if (countryEl) countryEl.textContent = result.name;
            if (numberEl) numberEl.textContent = result.emergency;
            if (noteEl) noteEl.textContent = '📞 ' + result.note;
            if (callBtn) callBtn.href = 'tel:' + result.emergency;
            
            resultCard.style.display = 'block';
            noResult.style.display = 'none';
        }

        // ============================================
        // SEARCH INPUT HANDLER
        // ============================================
        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            
            if (!query) {
                dropdown.classList.remove('show');
                resultCard.style.display = 'none';
                noResult.style.display = 'none';
                return;
            }

            const matches = countries.filter(c => c.name.toLowerCase().includes(query));
            
            if (matches.length > 0) {
                dropdown.innerHTML = '';
                matches.slice(0, 10).forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'dropdown-item';
                    div.innerHTML = `
                        <span class="country">${c.name}</span>
                        <span class="emergency">${c.emergency}</span>
                    `;
                    div.onclick = function() {
                        searchInput.value = c.name;
                        showResult(c);
                        dropdown.classList.remove('show');
                    };
                    dropdown.appendChild(div);
                });
                dropdown.classList.add('show');
                resultCard.style.display = 'none';
                noResult.style.display = 'none';
            } else {
                dropdown.classList.remove('show');
                resultCard.style.display = 'none';
                noResult.style.display = 'block';
            }
        });

        // ============================================
        // CLOSE DROPDOWN ON CLICK OUTSIDE
        // ============================================
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-container')) {
                dropdown.classList.remove('show');
            }
        });

        // ============================================
        // ENTER KEY SUPPORT
        // ============================================
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (query) {
                    const result = countries.find(c => c.name.toLowerCase() === query.toLowerCase());
                    if (result) {
                        showResult(result);
                        dropdown.classList.remove('show');
                    } else {
                        // Try partial match
                        const partial = countries.filter(c => c.name.toLowerCase().includes(query.toLowerCase()));
                        if (partial.length > 0) {
                            showResult(partial[0]);
                            dropdown.classList.remove('show');
                        } else {
                            resultCard.style.display = 'none';
                            noResult.style.display = 'block';
                            dropdown.classList.remove('show');
                        }
                    }
                }
            }
        });

        // ============================================
        // SHOW DEFAULT RESULT
        // ============================================
        function showDefaultResult() {
            const defaultCountry = countries.find(c => c.name === 'United States');
            if (defaultCountry) {
                const countryEl = document.getElementById('resultCountry');
                const numberEl = document.getElementById('resultNumber');
                const noteEl = document.getElementById('resultNote');
                const callBtn = document.getElementById('callBtn');
                
                if (countryEl) countryEl.textContent = defaultCountry.name;
                if (numberEl) numberEl.textContent = defaultCountry.emergency;
                if (noteEl) noteEl.textContent = '📞 ' + defaultCountry.note;
                if (callBtn) callBtn.href = 'tel:' + defaultCountry.emergency;
                
                resultCard.style.display = 'block';
                noResult.style.display = 'none';
            }
        }

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            // Show default result after a small delay
            setTimeout(showDefaultResult, 300);
            
            console.log('🆘 Emergency numbers loaded:', countries.length, 'countries');
            console.log('📞 Search for any country to find emergency numbers');
        });

        console.log('🆘 Emergency numbers page loaded successfully');
    </script>
</body>
</html>
