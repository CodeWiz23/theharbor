<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story — The Harbor</title>

    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://www.gstatic.com https://*.firebaseio.com 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        connect-src 'self' https://*.firebaseio.com https://*.googleapis.com;
    ">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5efe6;
            color: #2d3a3a;
            padding: 20px;
            max-width: 960px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
        }
        .crisis-banner {
            background: #1a4a4a;
            color: #f5f0eb;
            padding: 12px 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            margin-bottom: 24px;
            border-left: 5px solid #c47a5a;
        }
        .crisis-banner a {
            color: #e8ddd0;
            font-weight: bold;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 16px 0;
            border-bottom: 2px solid #c47a5a;
            margin-bottom: 24px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo-icon {
            font-size: 2.2rem;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 300;
            color: #1a4a4a;
        }
        .logo-text span {
            font-weight: 700;
            color: #c47a5a;
        }
        .logo-sub {
            font-size: 0.75rem;
            color: #7a9e7e;
            font-style: italic;
            display: block;
            margin-top: -4px;
        }
        .auth-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-login {
            padding: 8px 24px;
            border: 2px solid #1a4a4a;
            border-radius: 30px;
            background: #e8ddd0;
            color: #1a4a4a;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #1a4a4a;
            color: #f5f0eb;
        }
        .btn-signup {
            padding: 8px 24px;
            border: none;
            border-radius: 30px;
            background: #1a4a4a;
            color: #f5f0eb;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-signup:hover {
            background: #c47a5a;
        }
        .btn-logout {
            padding: 6px 18px;
            border: none;
            border-radius: 30px;
            background: #c47a5a;
            color: #f5f0eb;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-logout:hover {
            background: #a85a3a;
        }
        .user-info {
            background: #f5f0eb;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #d4c8b8;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .user-name {
            font-weight: 700;
            color: #1a4a4a;
        }
        .user-gender-badge {
            background: #e8ddd0;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .btn-primary {
            background: #1a4a4a;
            color: #f5f0eb;
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background: #c47a5a;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #e8ddd0;
            color: #1a4a4a;
            padding: 10px 28px;
            border: 2px solid #1a4a4a;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-secondary:hover {
            background: #1a4a4a;
            color: #f5f0eb;
        }
        .footer {
            text-align: center;
            color: #a8a09a;
            font-size: 0.8rem;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #d4c8b8;
        }
        .story-card {
            background: #f5f0eb;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #d4c8b8;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .story-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a4a4a;
            margin-bottom: 8px;
        }
        .story-meta {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: #7a9e7e;
            margin-bottom: 12px;
        }
        .category-badge {
            background: #e8ddd0;
            padding: 2px 14px;
            border-radius: 20px;
            color: #1a4a4a;
            font-weight: 600;
            font-size: 0.75rem;
        }
        .story-text {
            font-size: 1.05rem;
            color: #2d3a3a;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .story-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #d4c8b8;
        }
        .emoji-btn {
            background: #e8ddd0;
            border: 1px solid #d4c8b8;
            border-radius: 30px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            position: relative;
            user-select: none;
        }
        .emoji-btn:hover {
            background: #d4c8b8;
            transform: scale(1.08);
        }
        .emoji-btn:active {
            transform: scale(0.9);
        }
        .emoji-btn .count {
            font-size: 0.85rem;
            font-weight: 600;
            color: #7a9e7e;
            margin-left: 6px;
        }
        .emoji-btn .checkmark {
            color: #27ae60;
            font-size: 0.8rem;
            margin-left: 4px;
        }
        .emoji-btn.reacted {
            background: #d4e8d4;
            border-color: #27ae60;
        }
        .emoji-btn.reacted .count {
            color: #27ae60;
        }

        /* ============================================
        FLOATING EMOJI ANIMATION
        ============================================ */
        .floating-emoji {
            position: fixed;
            font-size: 3rem;
            pointer-events: none;
            z-index: 9999;
            animation: floatUp 1.5s ease-out forwards;
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: translateY(-150px) scale(1.3) rotate(20deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-350px) scale(1) rotate(-10deg);
            }
        }

        /* ============================================
        COMMENTS
        ============================================ */
        .comment-section {
            margin-top: 30px;
        }
        .comment-section textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #d4c8b8;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            background: #f5f0eb;
        }
        .comment-section textarea:focus {
            outline: none;
            border-color: #1a4a4a;
        }
        .comment {
            background: #f5f0eb;
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #e8ddd0;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 12px 0;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #1a4a4a;
            cursor: pointer;
        }
        .checkbox-group label {
            font-weight: 600;
            cursor: pointer;
            margin: 0;
        }
        .error-msg {
            color: #c0392b;
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
        }
        .loading {
            text-align: center;
            color: #7a9e7e;
            padding: 40px 0;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #7a9e7e;
        }
        .empty-state .big-emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
        }
        .empty-state h3 {
            color: #1a4a4a;
        }
        .card {
            background: #f5f0eb;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #d4c8b8;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-content {
            background: #f5f0eb;
            padding: 32px;
            border-radius: 24px;
            max-width: 440px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #d4c8b8;
        }
        .modal-close {
            float: right;
            font-size: 1.8rem;
            cursor: pointer;
            color: #a8a09a;
            transition: 0.3s;
        }
        .modal-close:hover {
            color: #1a4a4a;
        }
        .modal-content h2 {
            font-weight: 300;
            color: #1a4a4a;
            margin-bottom: 20px;
        }
        .modal-content label {
            display: block;
            font-weight: 600;
            color: #2d3a3a;
            margin-top: 14px;
            font-size: 0.9rem;
        }
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 12px;
            border: 2px solid #d4c8b8;
            border-radius: 10px;
            font-size: 1rem;
            margin-top: 4px;
            background: #ffffff;
            font-family: inherit;
            transition: 0.3s;
        }
        .modal-content input:focus,
        .modal-content select:focus {
            outline: none;
            border-color: #1a4a4a;
        }
        .modal-content .btn-modal {
            width: 100%;
            padding: 14px;
            background: #1a4a4a;
            color: #f5f0eb;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 18px;
            transition: 0.3s;
        }
        .modal-content .btn-modal:hover {
            background: #c47a5a;
        }
        .modal-content .btn-modal:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .switch-link {
            text-align: center;
            margin-top: 16px;
            color: #7a9e7e;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .switch-link:hover {
            color: #1a4a4a;
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .auth-buttons {
                justify-content: center;
            }
            .logo-text {
                font-size: 1.4rem;
            }
            .story-card {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Crisis Banner -->
        <div class="crisis-banner">
            ⚠️ <strong>Peer support only.</strong> Not a crisis line.
            If you're in danger, call <a href="https://988lifeline.org/" target="_blank">988 (US)</a>
        </div>

        <!-- Header -->
        <header class="header">
            <a href="index.html" class="logo">
                <span class="logo-icon">⚓</span>
                <div>
                    <span class="logo-text">The <span>Harbor</span></span>
                    <span class="logo-sub">Read & support</span>
                </div>
            </a>
            <div class="auth-buttons" id="authButtons">
                <button class="btn-login" onclick="openModal('login')">🔐 Log In</button>
                <button class="btn-signup" onclick="openModal('signup')">📝 Join</button>
            </div>
        </header>

        <!-- User Info -->
        <div class="user-info" id="userInfo">
            👤 Welcome, <span class="user-name" id="userName">—</span>
            <span class="user-gender-badge" id="userGenderBadge"></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <!-- Story Content -->
        <div id="storyContent">
            <div class="loading">⏳ Loading story...</div>
        </div>

        <!-- Comments Section -->
        <div class="comment-section card">
            <h3 style="margin-bottom:12px;">💬 Comments</h3>

            <div id="commentsContainer">
                <div class="loading">⏳ Loading comments...</div>
            </div>

            <div style="margin-top:20px;padding-top:20px;border-top:2px solid #d4c8b8;">
                <label for="commentText"><strong>Share your thoughts</strong></label>
                <textarea id="commentText" placeholder="Write a supportive comment..." maxlength="1000"></textarea>
                <div style="font-size:0.75rem;color:#7a9e7e;text-align:right;margin-top:2px;"><span id="commentCount">0</span>/1000</div>

                <div class="checkbox-group">
                    <input type="checkbox" id="commentAnonymous" />
                    <label for="commentAnonymous">🕊️ Post anonymously</label>
                </div>

                <div id="commentError" class="error-msg"></div>

                <button class="btn-primary" id="commentSubmitBtn" onclick="postComment()" style="margin-top:10px;">💬 Post Comment</button>
            </div>
        </div>

        <div style="text-align:center;margin-top:20px;">
            <a href="index.html" class="btn-secondary" style="text-decoration:none;display:inline-block;">← Back to Home</a>
        </div>

        <!-- Footer -->
        <footer class="footer">
            ⚓ The Harbor &mdash; built with 💚 for the community
        </footer>
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">🔐 Welcome Back</h2>
            <label for="authEmail">Email</label>
            <input type="email" id="authEmail" placeholder="you@example.com" />
            <label for="authPassword">Password</label>
            <input type="password" id="authPassword" placeholder="•••••••• (min 6 chars)" />
            <div id="passwordStrength"></div>
            <div id="signupFields" style="display:none;">
                <label for="authName">What should we call you?</label>
                <input type="text" id="authName" placeholder="Your name or nickname" />
                <label for="authGender">Your Gender</label>
                <select id="authGender">
                    <option value="🧔 Man">🧔 Man</option>
                    <option value="👩 Woman">👩 Woman</option>
                    <option value="⚧️ Non-binary">⚧️ Non-binary</option>
                    <option value="🙅 Prefer not to say">🙅 Prefer not to say</option>
                </select>
                <label for="authFavorites">What are your favorite things?</label>
                <input type="text" id="authFavorites" placeholder="Hiking, reading, fishing..." />
            </div>
            <button class="btn-modal" id="authSubmitBtn" onclick="handleAuth()">🚀 Log In</button>
            <div class="switch-link" id="authSwitch" onclick="toggleAuthMode()">
                Don't have an account? <strong>Sign Up</strong>
            </div>
            <div class="error-msg" id="authError"></div>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBoYWOijOWqjd3d3_NAiSsiGmQ0HokaRGs",
            authDomain: "the-harbor-community.firebaseapp.com",
            projectId: "the-harbor-community",
            storageBucket: "the-harbor-community.firebasestorage.app",
            messagingSenderId: "634248505303",
            appId: "1:634248505303:web:4eb16e6a9f97903420cd92"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentUserData = null;
        let userReactions = {};
        let currentStoryId = null;

        // ============================================
        // AUTH FUNCTIONS
        // ============================================

        function openModal(mode) {
            const modal = document.getElementById('authModal');
            if (!modal) return;
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const signupFields = document.getElementById('signupFields');
            const switchLink = document.getElementById('authSwitch');
            const error = document.getElementById('authError');
            if (error) error.textContent = '';
            document.getElementById('authEmail').value = '';
            document.getElementById('authPassword').value = '';
            document.getElementById('authName').value = '';
            document.getElementById('authFavorites').value = '';
            document.getElementById('passwordStrength').innerHTML = '';
            if (mode === 'login') {
                title.textContent = '🔐 Welcome Back';
                submitBtn.textContent = '🚀 Log In';
                signupFields.style.display = 'none';
                switchLink.innerHTML = `Don't have an account? <strong>Sign Up</strong>`;
                switchLink.dataset.mode = 'signup';
            } else {
                title.textContent = '📝 Join The Harbor';
                submitBtn.textContent = '🚀 Create Account';
                signupFields.style.display = 'block';
                switchLink.innerHTML = `Already have an account? <strong>Log In</strong>`;
                switchLink.dataset.mode = 'login';
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('authModal').style.display = 'none';
        }

        function toggleAuthMode() {
            const switchLink = document.getElementById('authSwitch');
            if (!switchLink) return;
            const mode = switchLink.dataset.mode;
            closeModal();
            setTimeout(() => openModal(mode), 200);
        }

        function handleAuth() {
            const emailInput = document.getElementById('authEmail');
            const passwordInput = document.getElementById('authPassword');
            const error = document.getElementById('authError');
            const submitBtn = document.getElementById('authSubmitBtn');
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            error.textContent = '';
            if (!email || !email.includes('@') || !email.includes('.')) {
                error.textContent = 'Please enter a valid email address.';
                return;
            }
            if (!password || password.length < 6) {
                error.textContent = 'Password must be at least 6 characters.';
                return;
            }
            const isLogin = submitBtn.textContent.includes('Log In');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Please wait...';
            if (isLogin) {
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        const user = userCredential.user;
                        if (!user.emailVerified) {
                            error.textContent = '⚠️ Please verify your email first. Check your inbox!';
                            auth.signOut();
                            submitBtn.disabled = false;
                            submitBtn.textContent = '🚀 Log In';
                            return;
                        }
                        closeModal();
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Log In';
                    })
                    .catch((err) => {
                        error.textContent = err.message;
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Log In';
                    });
            } else {
                const name = document.getElementById('authName').value.trim();
                const gender = document.getElementById('authGender').value;
                const favorites = document.getElementById('authFavorites').value.trim();
                if (!name || name.length < 2) {
                    error.textContent = 'Please enter your name (minimum 2 characters).';
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 Create Account';
                    return;
                }
                auth.createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        const user = userCredential.user;
                        return user.sendEmailVerification().then(() => user);
                    })
                    .then((user) => {
                        return db.collection('users').doc(user.uid).set({
                            name: name,
                            email: email,
                            gender: gender,
                            favorites: favorites || 'Not specified',
                            emailVerified: false,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            lastActive: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    })
                    .then(() => {
                        closeModal();
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Create Account';
                        auth.signOut();
                        alert('✅ Verification email sent! Please check your inbox.');
                    })
                    .catch((err) => {
                        error.textContent = err.message;
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Create Account';
                    });
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                auth.signOut();
                window.location.href = 'index.html';
            }
        }

        auth.onAuthStateChanged((user) => {
            const authButtons = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            const userName = document.getElementById('userName');
            const userGenderBadge = document.getElementById('userGenderBadge');
            if (user) {
                currentUser = user;
                authButtons.style.display = 'none';
                userInfo.style.display = 'flex';
                db.collection('users').doc(user.uid).get()
                    .then((doc) => {
                        if (doc.exists) {
                            currentUserData = doc.data();
                            userName.textContent = currentUserData.name || 'Friend';
                            userGenderBadge.textContent = currentUserData.gender || '';
                        }
                    })
                    .catch((err) => console.error('Error fetching user data:', err));
            } else {
                currentUser = null;
                currentUserData = null;
                authButtons.style.display = 'flex';
                userInfo.style.display = 'none';
            }
        });

        // ============================================
        // FLOATING EMOJI ANIMATION
        // ============================================

        function createFloatingEmoji(emoji, x, y) {
            const el = document.createElement('div');
            el.className = 'floating-emoji';
            el.textContent = emoji;
            
            // Random offset from click position
            const offsetX = (Math.random() - 0.5) * 200;
            const offsetY = (Math.random() - 0.5) * 100;
            
            el.style.left = (x + offsetX) + 'px';
            el.style.top = (y + offsetY) + 'px';
            el.style.fontSize = (2 + Math.random() * 2) + 'rem';
            
            document.body.appendChild(el);
            
            // Remove after animation
            setTimeout(() => {
                el.remove();
            }, 1600);
        }

        // ============================================
        // LOAD STORY
        // ============================================

        function loadStory() {
            const urlParams = new URLSearchParams(window.location.search);
            const storyId = urlParams.get('id');
            const content = document.getElementById('storyContent');

            if (!content) return;

            if (!storyId) {
                content.innerHTML = '<div class="empty-state"><h3>No story selected</h3><a href="index.html">Go back home</a></div>';
                return;
            }

            currentStoryId = storyId;
            content.innerHTML = '<div class="loading">⏳ Loading story...</div>';

            db.collection('stories').doc(storyId).get()
                .then((doc) => {
                    if (!doc.exists) {
                        content.innerHTML =
                            '<div class="empty-state"><h3>Story not found</h3><a href="index.html">Go back home</a></div>';
                        return;
                    }
                    const story = doc.data();
                    story.id = doc.id;
                    content.innerHTML = renderFullStory(story);
                    
                    if (currentUser) {
                        loadUserReactions(storyId);
                    }
                    
                    loadComments(storyId);
                })
                .catch((err) => {
                    content.innerHTML =
                        `<div class="empty-state"><h3>Error loading story</h3><p>${err.message}</p></div>`;
                });
        }

        function renderFullStory(story) {
            const author = story.isAnonymous ? '🕊️ Anonymous' : escapeHTML(story.authorName || 'Someone');
            const categoryNames = {
                'men': '🧔 Men\'s Harbor',
                'women': '👩 Women\'s Harbor',
                'struggles': '🌊 The Storm',
                'fun': '☀️ Sunny Skies',
                'learning': '🧭 The Compass'
            };
            const categoryDisplay = categoryNames[story.category] || story.category;
            const time = story.createdAt ? story.createdAt.toDate().toLocaleString() : 'Recently';

            const reactions = story.reactions || {};
            const emojis = ['❤️', '🙏', '😢', '💪', '🤗', '🌊', '🕊️', '👊'];

            let reactionButtons = '';
            emojis.forEach((emoji) => {
                const count = reactions[emoji] || 0;
                const hasReacted = userReactions[story.id] && userReactions[story.id].includes(emoji);
                reactionButtons += `
                    <button class="emoji-btn ${hasReacted ? 'reacted' : ''}" 
                            id="reaction-${story.id}-${emoji}" 
                            onclick="toggleReaction('${story.id}', '${emoji}')">
                        ${emoji} <span class="count" id="count-${story.id}-${emoji}">${count}</span>
                        ${hasReacted ? '<span class="checkmark">✅</span>' : ''}
                    </button>
                `;
            });

            return `
                <div class="story-card" id="storyCard">
                    <div class="story-title">${escapeHTML(story.title)}</div>
                    <div class="story-meta">
                        <span>✍️ ${author}</span>
                        <span class="category-badge">${categoryDisplay}</span>
                        <span>📅 ${time}</span>
                    </div>
                    <div class="story-text">${escapeHTML(story.text)}</div>
                    <div class="story-actions">
                        ${reactionButtons}
                    </div>
                </div>
            `;
        }

        // ============================================
        // TOGGLE REACTION (Add/Remove - No Page Reload)
        // ============================================

        function toggleReaction(storyId, emoji) {
            if (!currentUser) {
                alert('Please log in to react.');
                return;
            }

            if (!currentUser.emailVerified) {
                alert('Please verify your email first.');
                return;
            }

            const storyRef = db.collection('stories').doc(storyId);
            const userReactionRef = db.collection('users').doc(currentUser.uid)
                .collection('reactions').doc(storyId);

            // Check if user already reacted with this emoji
            const hasReacted = userReactions[storyId] && userReactions[storyId].includes(emoji);

            // Get click position for floating emoji
            const rect = document.getElementById('storyCard')?.getBoundingClientRect();
            const x = rect ? rect.left + rect.width / 2 : window.innerWidth / 2;
            const y = rect ? rect.top + rect.height / 2 : window.innerHeight / 2;
            
            // Create floating emoji (even before DB update for instant feedback)
            createFloatingEmoji(emoji, x, y);

            db.runTransaction((transaction) => {
                return transaction.get(storyRef).then((doc) => {
                    if (!doc.exists) return;
                    const data = doc.data();
                    const reactions = data.reactions || {};
                    
                    if (hasReacted) {
                        // REMOVE reaction
                        reactions[emoji] = Math.max((reactions[emoji] || 0) - 1, 0);
                        // Remove from user reactions
                        if (userReactions[storyId]) {
                            userReactions[storyId] = userReactions[storyId].filter(e => e !== emoji);
                        }
                    } else {
                        // ADD reaction
                        reactions[emoji] = (reactions[emoji] || 0) + 1;
                        // Add to user reactions
                        if (!userReactions[storyId]) {
                            userReactions[storyId] = [];
                        }
                        userReactions[storyId].push(emoji);
                    }
                    
                    transaction.update(storyRef, { reactions: reactions });
                    transaction.set(userReactionRef, {
                        emojis: userReactions[storyId] || []
                    });
                });
            })
            .then(() => {
                // Update UI instantly - NO PAGE RELOAD
                const countSpan = document.getElementById(`count-${storyId}-${emoji}`);
                const btn = document.getElementById(`reaction-${storyId}-${emoji}`);
                
                if (countSpan) {
                    const currentCount = parseInt(countSpan.textContent) || 0;
                    countSpan.textContent = hasReacted ? currentCount - 1 : currentCount + 1;
                }
                
                if (btn) {
                    if (hasReacted) {
                        btn.classList.remove('reacted');
                        const checkmark = btn.querySelector('.checkmark');
                        if (checkmark) checkmark.remove();
                    } else {
                        btn.classList.add('reacted');
                        if (!btn.querySelector('.checkmark')) {
                            btn.innerHTML += ' <span class="checkmark">✅</span>';
                        }
                    }
                }
            })
            .catch((err) => {
                console.error('Error toggling reaction:', err);
                alert('Could not update reaction. Please try again.');
            });
        }

        // ============================================
        // LOAD USER REACTIONS
        // ============================================

        function loadUserReactions(storyId) {
            if (!currentUser) return;
            
            const userReactionRef = db.collection('users').doc(currentUser.uid)
                .collection('reactions').doc(storyId);
                
            userReactionRef.get()
                .then((doc) => {
                    if (doc.exists) {
                        userReactions[storyId] = doc.data().emojis || [];
                        // Update button states
                        const emojis = ['❤️', '🙏', '😢', '💪', '🤗', '🌊', '🕊️', '👊'];
                        emojis.forEach((emoji) => {
                            const btn = document.getElementById(`reaction-${storyId}-${emoji}`);
                            if (btn) {
                                if (userReactions[storyId].includes(emoji)) {
                                    btn.classList.add('reacted');
                                    if (!btn.querySelector('.checkmark')) {
                                        btn.innerHTML += ' <span class="checkmark">✅</span>';
                                    }
                                }
                            }
                        });
                    }
                })
                .catch((err) => console.error('Error loading user reactions:', err));
        }

        // ============================================
        // COMMENTS
        // ============================================

        function loadComments(storyId) {
            const container = document.getElementById('commentsContainer');
            if (!container) return;

            container.innerHTML = '<div class="loading">⏳ Loading comments...</div>';

            db.collection('comments')
                .where('storyId', '==', storyId)
                .get()
                .then((snapshot) => {
                    if (snapshot.empty) {
                        container.innerHTML = `
                            <div class="empty-state" style="padding:20px;">
                                <p style="color:#7a9e7e;">No comments yet. Be the first to share your thoughts.</p>
                            </div>
                        `;
                        return;
                    }

                    const comments = [];
                    snapshot.forEach((doc) => {
                        const comment = doc.data();
                        comment.id = doc.id;
                        comments.push(comment);
                    });
                    
                    comments.sort((a, b) => {
                        const timeA = a.createdAt ? a.createdAt.toDate().getTime() : 0;
                        const timeB = b.createdAt ? b.createdAt.toDate().getTime() : 0;
                        return timeB - timeA;
                    });

                    let html = '<h3 style="margin-bottom:16px;">💬 Comments</h3>';
                    comments.forEach((comment) => {
                        html += renderComment(comment);
                    });
                    container.innerHTML = html;
                })
                .catch((err) => {
                    console.error('Error loading comments:', err);
                    container.innerHTML = `
                        <div class="empty-state">
                            <p style="color:#c0392b;">⚠️ Error loading comments</p>
                            <button class="btn-primary" onclick="loadComments('${storyId}')" style="margin-top:10px;padding:8px 20px;font-size:0.9rem;">
                                🔄 Retry
                            </button>
                        </div>
                    `;
                });
        }

        function renderComment(comment) {
            const author = comment.isAnonymous ? '🕊️ Anonymous' : escapeHTML(comment.authorName || 'Someone');
            const time = comment.createdAt ? comment.createdAt.toDate().toLocaleString() : 'Recently';
            const likes = comment.likes || 0;
            const isOwner = currentUser && comment.userId === currentUser.uid;

            return `
                <div class="comment" id="comment-${comment.id}">
                    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;font-size:0.85rem;color:#7a9e7e;margin-bottom:6px;">
                        <span>✍️ ${author}</span>
                        <span>📅 ${time}</span>
                    </div>
                    <div style="font-size:0.95rem;line-height:1.6;">${escapeHTML(comment.text)}</div>
                    <div style="margin-top:8px;display:flex;gap:12px;align-items:center;">
                        <button class="emoji-btn" onclick="likeComment('${comment.id}')" style="padding:2px 12px;font-size:0.85rem;">
                            👍 <span class="count">${likes}</span>
                        </button>
                        ${isOwner ? 
                            `<button onclick="deleteComment('${comment.id}')" style="background:#c0392b;color:white;border:none;border-radius:20px;padding:2px 14px;cursor:pointer;font-size:0.75rem;">Delete</button>` 
                            : ''}
                    </div>
                </div>
            `;
        }

        function postComment() {
            if (!currentUser) {
                alert('Please log in to comment.');
                return;
            }

            if (!currentUser.emailVerified) {
                alert('Please verify your email first.');
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const storyId = urlParams.get('id');
            const textInput = document.getElementById('commentText');
            const anonymousCheck = document.getElementById('commentAnonymous');
            const error = document.getElementById('commentError');

            if (!textInput || !error) return;

            const text = textInput.value.trim();
            const isAnonymous = anonymousCheck ? anonymousCheck.checked : false;

            error.textContent = '';

            if (!text || text.length < 1) {
                error.textContent = 'Please write a comment.';
                return;
            }
            if (text.length > 1000) {
                error.textContent = 'Comment must be under 1000 characters.';
                return;
            }

            const submitBtn = document.getElementById('commentSubmitBtn');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.textContent = '⏳ Posting...';
            }

            db.collection('comments').add({
                storyId: storyId,
                text: text,
                userId: currentUser.uid,
                authorName: currentUserData ? currentUserData.name : 'Someone',
                isAnonymous: isAnonymous,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                likes: 0
            })
            .then(() => {
                db.collection('stories').doc(storyId).update({
                    commentCount: firebase.firestore.FieldValue.increment(1)
                });
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '💬 Post Comment';
                }
                if (textInput) textInput.value = '';
                document.getElementById('commentCount').textContent = '0';
                loadComments(storyId);
            })
            .catch((err) => {
                error.textContent = err.message;
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '💬 Post Comment';
                }
            });
        }

        function likeComment(commentId) {
            if (!currentUser) {
                alert('Please log in to like comments.');
                return;
            }

            db.collection('comments').doc(commentId).update({
                likes: firebase.firestore.FieldValue.increment(1)
            })
            .then(() => {
                const urlParams = new URLSearchParams(window.location.search);
                loadComments(urlParams.get('id'));
            })
            .catch((err) => {
                console.error('Error liking comment:', err);
            });
        }

        function deleteComment(commentId) {
            if (!confirm('Are you sure you want to delete this comment?')) return;

            db.collection('comments').doc(commentId).delete()
                .then(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    loadComments(urlParams.get('id'));
                })
                .catch((err) => {
                    console.error('Error deleting comment:', err);
                    alert('Could not delete comment.');
                });
        }

        // ============================================
        // UTILITY
        // ============================================

        function escapeHTML(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;',
                '/': '&#x2F;',
                '`': '&#x60;',
                '=': '&#x3D;'
            };
            return String(text).replace(/[&<>"'/`=]/g, function(m) { return map[m]; });
        }

        // ============================================
        // INIT
        // ============================================

        document.addEventListener('DOMContentLoaded', function() {
            // Comment character counter
            const commentText = document.getElementById('commentText');
            const commentCount = document.getElementById('commentCount');
            if (commentText && commentCount) {
                commentText.addEventListener('input', function() {
                    commentCount.textContent = this.value.length;
                });
            }

            // Modal close
            document.getElementById('authModal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            // Password strength
            document.getElementById('authPassword').addEventListener('input', function() {
                const pwd = this.value;
                const strengthDiv = document.getElementById('passwordStrength');
                if (!strengthDiv) return;
                if (pwd.length === 0) {
                    strengthDiv.innerHTML = '';
                    return;
                }
                let strength = 'Weak',
                    color = '#c0392b';
                if (pwd.length >= 12) { strength = 'Strong';
                    color = '#27ae60'; } else if (pwd.length >= 8) { strength = 'Medium';
                    color = '#f39c12'; }
                strengthDiv.innerHTML = `
                    <div style="margin-top:6px;font-size:0.85rem;">
                        Strength: <span style="color:${color};font-weight:700;">${strength}</span>
                    </div>
                `;
            });

            // Enter key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const modal = document.getElementById('authModal');
                    if (modal && modal.style.display === 'flex') {
                        handleAuth();
                    }
                }
            });

            // Load story
            loadStory();

            console.log('✅ Story page ready');
        });

        console.log('📖 Story page loaded with toggle reactions + floating emojis');
    </script>
