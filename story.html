    <script>
        var currentStory = null;
        var reactionLocks = {};
        var commentLikeLocks = {};
        var commentsUnsubscribe = null;

        function viewProfile(userId) { if (userId) window.location.href = 'profile.html?uid=' + userId; }
        window.viewProfile = viewProfile;

        function applyGuestRestrictions() {
            var isLoggedIn = (typeof currentUser !== 'undefined' && currentUser !== null && currentUser !== false);
            document.querySelectorAll('.guest-only').forEach(el => { if (el.hasAttribute('hidden')) return; el.style.display = isLoggedIn ? '' : 'none'; });
            document.querySelectorAll('.auth-only').forEach(el => el.style.display = isLoggedIn ? 'none' : '');
            var ui = document.getElementById('userInfo'); if (ui) ui.style.display = isLoggedIn ? 'flex' : 'none';
        }

        (function() {
            const termsCheckbox = document.getElementById('termsCheckbox');
            const authSubmitBtn = document.getElementById('authSubmitBtn');
            if (termsCheckbox && authSubmitBtn) {
                const toggleBtn = () => { var isSignup = document.getElementById('signupFields')?.style.display !== 'none'; authSubmitBtn.disabled = isSignup ? !termsCheckbox.checked : false; authSubmitBtn.style.opacity = isSignup && !termsCheckbox.checked ? '0.5' : '1'; };
                termsCheckbox.addEventListener('change', toggleBtn);
                var orig = toggleAuthMode; window.toggleAuthMode = function() { orig(); setTimeout(toggleBtn, 100); };
                toggleBtn();
            }
        })();

        function loadStory() {
            var urlParams = new URLSearchParams(window.location.search);
            var storyId = urlParams.get('id'); currentStoryId = storyId;
            var content = document.getElementById('storyContent'); if (!content) return;
            if (!storyId) { content.innerHTML = '<div class="empty-state"><div class="big-emoji">📭</div><h3>No story selected</h3></div>'; return; }
            content.innerHTML = '<div class="loading"><div class="loading-spinner"></div> Loading...</div>';
            db.collection('stories').doc(storyId).get().then(doc => {
                if (!doc.exists) { content.innerHTML = '<div class="empty-state"><h3>Story not found</h3></div>'; return; }
                var story = doc.data(); story.id = doc.id; currentStory = story;
                if (story.visibility === 'private' && (!currentUser || story.userId !== currentUser.uid)) { content.innerHTML = '<div class="empty-state"><div class="big-emoji">🔒</div><h3>Private Story</h3></div>'; return; }
                if (!currentUser) { content.innerHTML = '<div class="empty-state"><div class="big-emoji">🔒</div><h3>Login Required</h3></div>'; return; }
                if (!currentUser.emailVerified) { content.innerHTML = '<div class="empty-state"><div class="big-emoji">📧</div><h3>Email Not Verified</h3></div>'; return; }
                content.innerHTML = renderFullStory(story);
                loadUserReactionsForStory(storyId);
                loadCommentsRealtime(storyId);
            }).catch(err => { content.innerHTML = '<div class="empty-state"><div class="big-emoji">⚠️</div><h3>Error</h3></div>'; });
        }

        function renderFullStory(story) {
            var author = story.isAnonymous ? '🕊️ Anonymous' : escapeHTML(story.authorName || 'Someone');
            var catNames = {men:"🧔 Men's Harbor",women:"👩 Women's Harbor",struggles:'🌊 The Storm',fun:'☀️ Sunny Skies',learning:'🧭 The Compass'};
            var catDisp = catNames[story.category] || story.category;
            var time = story.createdAt ? story.createdAt.toDate().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true}) : 'Recently';
            var reactions = story.reactions || {};
            var emojis = ['❤️','🙏','😢','💪','🤗','🌊','🕊️','👊'];
            var isOwner = currentUser && story.userId === currentUser.uid;
            var isAdmin = currentUserData && currentUserData.isAdmin === true;
            var reactionBtns = '';
            emojis.forEach(function(emoji) {
                var count = reactions[emoji] || 0;
                var hasReacted = userReactions[story.id] && userReactions[story.id].indexOf(emoji) !== -1;
                var locked = reactionLocks[story.id+'_'+emoji];
                reactionBtns += '<button class="reaction-btn'+(hasReacted?' reacted':'')+'" id="reaction-'+story.id+'-'+emoji+'" onclick="storyToggleReaction(\''+story.id+'\',\''+emoji+'\')" '+(locked?'disabled':'')+'>'+emoji+' <span class="count" id="count-'+story.id+'-'+emoji+'">'+count+'</span></button>';
            });
            var fullText = story.text || '';
            var showMore = fullText.length > 300;
            var excerpt = showMore ? fullText.substring(0, 300) : fullText;
            var textHtml = '<span class="excerpt-text">'+escapeHTML(excerpt)+'</span>';
            if (showMore) textHtml += '<span class="full-text" style="display:none;">'+escapeHTML(fullText.substring(300))+'</span> <button class="read-more-btn" id="readMoreBtn" onclick="toggleReadMore()">Read More ▼</button>';
            
            var visibilityLabel = story.visibility === 'public' ? '🌍 Public' : '🔒 Private';
            var visibilityChecked = story.visibility === 'public' ? 'checked' : '';
            var visibilityToggleHTML = isOwner ? '<div class="visibility-toggle-row"><span class="toggle-label">Visibility</span><label class="toggle-switch-sm"><input type="checkbox" '+visibilityChecked+' onchange="toggleStoryVisibilityUI(this)" /><span class="toggle-slider-sm"></span></label><span class="visibility-status '+(story.visibility==='public'?'public':'private')+'" id="visibilityStatusLabel">'+visibilityLabel+'</span></div>' : '';
            
            return '<div class="story-full" id="storyCard"><div class="gear-menu-container"><button class="gear-icon" onclick="toggleGearMenu(event)" title="Options">⚙️</button><div class="gear-dropdown" id="gearDropdown">'+(isOwner?'<button onclick="openEditStoryModal()">✏️ Edit Story</button>':'')+visibilityToggleHTML+(isOwner?'<button class="danger" onclick="deleteCurrentStory()">🗑️ Delete Story</button>':'')+(isAdmin&&!isOwner?'<button class="danger" onclick="deleteCurrentStory()">🗑️ Admin Delete</button>':'')+(currentUser&&!isOwner?'<button onclick="reportThisStory()">🚩 Report Story</button>':'')+'</div></div><h1 class="story-title">'+escapeHTML(story.title)+'</h1><div class="story-meta-row"><span>✍️ <span class="meta-author-link" onclick="event.stopPropagation();viewProfile(\''+story.userId+'\')">'+author+'</span></span><span class="category-badge">'+catDisp+'</span><span>📅 '+time+'</span>'+(story.flagged?'<span style="color:var(--warning);">⚠️</span>':'')+'<span class="gold-badge">'+(story.goldReceived||0)+' 🪙</span></div><div class="story-text" id="storyContentText">'+textHtml+'</div><div class="story-action-bar">'+reactionBtns+(currentUser&&story.userId!==currentUser.uid?'<button class="btn btn-secondary" onclick="openGoldDonation(\''+story.id+'\')" style="font-weight:700;background:linear-gradient(135deg,#f1c40f,#f39c12);color:white;border:none;">🪙 Donate Gold</button>':'')+'</div></div>';
        }

        function toggleGearMenu(event) { event.stopPropagation(); var d=document.getElementById('gearDropdown'); if(d)d.classList.toggle('show'); }
        document.addEventListener('click',function(e){if(!e.target.closest('.gear-menu-container')){var d=document.getElementById('gearDropdown');if(d)d.classList.remove('show');}});
        
        function toggleReadMore(){
            var f=document.querySelector('.full-text'),b=document.getElementById('readMoreBtn');
            if(!f||!b)return;
            if(f.style.display==='none'){f.style.display='inline';b.textContent='Show Less ▲';}
            else{f.style.display='none';b.textContent='Read More ▼';}
        }

        function toggleStoryVisibilityUI(checkbox) {
            if(!currentStory || currentStory.userId !== currentUser.uid) return;
            var newVis = checkbox.checked ? 'public' : 'private';
            db.collection('stories').doc(currentStory.id).update({ visibility: newVis }).then(function(){
                currentStory.visibility = newVis;
                var label = document.getElementById('visibilityStatusLabel');
                if(label){
                    label.textContent = newVis === 'public' ? '🌍 Public' : '🔒 Private';
                    label.className = 'visibility-status ' + newVis;
                }
            }).catch(function(e){ 
                alert('❌ ' + e.message); 
                checkbox.checked = !checkbox.checked;
            });
        }

        // ✅ SINGLE reaction handler — prevents double increment
        function storyToggleReaction(storyId,emoji){
            if(!currentUser||!currentUser.emailVerified)return;
            var lockKey=storyId+'_'+emoji;
            if(reactionLocks[lockKey])return;
            reactionLocks[lockKey]=true;
            
            if(!userReactions[storyId])userReactions[storyId]=[];
            var hasReacted=userReactions[storyId].indexOf(emoji)!==-1;
            var btn=document.getElementById('reaction-'+storyId+'-'+emoji);
            if(btn)btn.disabled=true;
            
            // Floating emoji
            var card=document.getElementById('storyCard');
            var rect=card?card.getBoundingClientRect():null;
            if(typeof createFloatingEmoji==='function'){
                createFloatingEmoji(emoji, rect?rect.left+rect.width/2:window.innerWidth/2, rect?rect.top+rect.height/2:window.innerHeight/2);
            }
            
            var storyRef=db.collection('stories').doc(storyId);
            var userRef=db.collection('users').doc(currentUser.uid).collection('reactions').doc(storyId);
            
            // ✅ Use single atomic operation — no double increment
            if(hasReacted){
                userReactions[storyId]=userReactions[storyId].filter(function(e){return e!==emoji;});
                storyRef.update({['reactions.'+emoji]:firebase.firestore.FieldValue.increment(-1)}).then(function(){
                    userRef.set({emojis:userReactions[storyId],timestamp:firebase.firestore.FieldValue.serverTimestamp(),storyId:storyId},{merge:true});
                    updateReactionUI(storyId,emoji,hasReacted,btn);
                }).catch(function(){if(btn)btn.disabled=false;reactionLocks[lockKey]=false;});
            } else {
                userReactions[storyId].push(emoji);
                storyRef.update({['reactions.'+emoji]:firebase.firestore.FieldValue.increment(1)}).then(function(){
                    userRef.set({emojis:userReactions[storyId],timestamp:firebase.firestore.FieldValue.serverTimestamp(),storyId:storyId},{merge:true});
                    updateReactionUI(storyId,emoji,hasReacted,btn);
                }).catch(function(){if(btn)btn.disabled=false;reactionLocks[lockKey]=false;});
            }
        }
        
        function updateReactionUI(storyId,emoji,hasReacted,btn){
            if(btn)btn.disabled=false;
            var cs=document.getElementById('count-'+storyId+'-'+emoji);
            if(cs)cs.textContent=hasReacted?(parseInt(cs.textContent)||0)-1:(parseInt(cs.textContent)||0)+1;
            if(btn){if(hasReacted)btn.classList.remove('reacted');else btn.classList.add('reacted');}
            reactionLocks[storyId+'_'+emoji]=false;
        }

        function loadUserReactionsForStory(storyId){
            if(!currentUser)return;
            db.collection('users').doc(currentUser.uid).collection('reactions').doc(storyId).get().then(doc=>{
                if(doc.exists){userReactions[storyId]=doc.data().emojis||[];
                    ['❤️','🙏','😢','💪','🤗','🌊','🕊️','👊'].forEach(e=>{
                        var btn=document.getElementById('reaction-'+storyId+'-'+e);
                        if(btn&&userReactions[storyId].indexOf(e)!==-1)btn.classList.add('reacted');
                    });
                }
            }).catch(()=>{});
        }

        // ============================================
        // COMMENTS — NESTED REPLIES WITH REPLY-TO-REPLY
        // ============================================

        function loadCommentsRealtime(storyId){
            var container=document.getElementById('commentsContainer');if(!container)return;
            if(commentsUnsubscribe)commentsUnsubscribe();
            container.innerHTML='<div class="loading"><div class="loading-spinner"></div> Loading...</div>';
            commentsUnsubscribe=db.collection('comments').where('storyId','==',storyId).onSnapshot(snapshot=>{
                if(snapshot.empty){container.innerHTML='<div class="empty-state" style="padding:20px;"><p style="color:var(--text-muted);">💬 No comments yet.</p></div>';document.getElementById('commentCountHeader').textContent='0';return;}
                var allComments=[];snapshot.forEach(doc=>{var c=doc.data();c.id=doc.id;allComments.push(c);});
                allComments=allComments.filter(c=>c.approved!==false);
                var parents=allComments.filter(c=>!c.parentId);
                parents.sort((a,b)=>{if(a.isPinned&&!b.isPinned)return-1;if(!a.isPinned&&b.isPinned)return 1;return(b.likes||0)-(a.likes||0);});
                document.getElementById('commentCountHeader').textContent=parents.length;
                container.innerHTML=parents.map(function(c){ return renderCommentTree(c, allComments, 0); }).join('');
            },err=>{container.innerHTML='<div class="empty-state"><p style="color:var(--danger);">⚠️ Error</p></div>';});
        }

        // ✅ Recursive — anyone can reply to any comment, max 10 depth
        function renderCommentTree(comment, allComments, depth){
            if(depth===undefined)depth=0;
            var MAX_DEPTH=9;
            if(depth>MAX_DEPTH)return'';
            
            var childReplies=allComments.filter(function(r){return r.parentId===comment.id;});
            childReplies.sort(function(a,b){return(a.createdAt?.toDate().getTime()||0)-(b.createdAt?.toDate().getTime()||0);});
            
            var repliesHtml='';
            if(childReplies.length>0){
                var marginLeft=Math.min(20+depth*6,50);
                repliesHtml='<div class="reply-thread" style="margin-left:'+marginLeft+'px;">'+
                    childReplies.map(function(r){return renderCommentTree(r,allComments,depth+1);}).join('')+
                '</div>';
            }
            return renderSingleComment(comment,depth>0,depth)+repliesHtml;
        }

        function renderSingleComment(comment,isReply,depth){
            if(depth===undefined)depth=0;
            var MAX_DEPTH=9;
            var atMaxDepth=depth>=MAX_DEPTH;
            var author=comment.isAnonymous?'🕊️ Anonymous':escapeHTML(comment.authorName||'Someone');
            var time=comment.createdAt?comment.createdAt.toDate().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true}):'Recently';
            var likes=comment.likes||0;
            var isCommentOwner=currentUser&&comment.userId===currentUser.uid;
            var isStoryAuthor=currentUser&&currentStory&&currentStory.userId===currentUser.uid;
            var isAdmin=currentUserData&&currentUserData.isAdmin===true;
            var canDelete=isCommentOwner||isStoryAuthor||isAdmin;
            var badges='';
            if(comment.isPinned)badges+='<span class="comment-badge pinned">📌 Pinned</span>';
            if(isReply)badges+='<span class="comment-badge" style="background:#e0e7ff;color:#3730a3;">↩️ Reply</span>';
            var replyCount=comment.replyCount||0;
            var cleanAuthor=comment.isAnonymous?'':escapeHTML(comment.authorName||'');
            
            // ✅ ANY comment can be replied to (not just parent comments)
            var replyButtonHTML='';
            if(!atMaxDepth){
                replyButtonHTML='<button class="reply-toggle" onclick="toggleReplyBox(\''+comment.id+'\',\''+cleanAuthor+'\')">💬 Reply'+(replyCount>0?' ('+replyCount+')':'')+'</button>';
            } else {
                replyButtonHTML='<span class="max-depth-msg">📌 Max depth — <a href="#commentText" onclick="document.getElementById(\'commentText\').focus()" style="color:var(--primary);cursor:pointer;">start new comment</a></span>';
            }
            
            return '<div class="comment" id="comment-'+comment.id+'">'+
                '<div class="comment-header">'+
                    '<div class="comment-author">✍️ <span class="comment-author-link" onclick="event.stopPropagation();viewProfile(\''+comment.userId+'\')">'+author+'</span> '+badges+'</div>'+
                    '<div class="comment-time">📅 '+time+'</div>'+
                '</div>'+
                '<div class="comment-text">'+escapeHTML(comment.text)+'</div>'+
                '<div class="comment-actions">'+
                    '<button class="comment-like-btn" id="like-btn-'+comment.id+'" onclick="likeComment(\''+comment.id+'\')">❤️ <span id="like-count-'+comment.id+'">'+likes+'</span></button>'+
                    replyButtonHTML+
                    (canDelete?'<button class="comment-delete-btn" onclick="deleteComment(\''+comment.id+'\')">🗑️</button>':'')+
                    (isAdmin?'<button class="comment-pin-btn" onclick="pinComment(\''+comment.id+'\')">'+(comment.isPinned?'📌 Unpin':'📌 Pin')+'</button>':'')+
                    (currentUser&&!isCommentOwner?'<button class="comment-report-btn" onclick="reportComment(\''+comment.id+'\',\''+comment.storyId+'\')">🚩</button>':'')+
                '</div>'+
                '<div class="reply-input-area" id="reply-area-'+comment.id+'">'+
                    '<textarea id="reply-text-'+comment.id+'" placeholder="Write a reply... (@username to mention)" maxlength="500"></textarea>'+
                    '<button class="btn btn-primary" onclick="postReply(\''+comment.id+'\')" style="margin-top:4px;padding:4px 12px;font-size:0.8rem;">📤 Reply</button>'+
                '</div>'+
            '</div>';
        }

        function toggleReplyBox(commentId,authorName){
            var area=document.getElementById('reply-area-'+commentId);
            if(area){
                document.querySelectorAll('.reply-input-area.active').forEach(function(other){
                    if(other.id!=='reply-area-'+commentId)other.classList.remove('active');
                });
                area.classList.toggle('active');
                if(area.classList.contains('active')){
                    var textarea=document.getElementById('reply-text-'+commentId);
                    if(textarea){
                        textarea.value=authorName&&authorName.trim()!==''?'@'+authorName+' ':'';
                        textarea.focus();
                        textarea.setSelectionRange(textarea.value.length,textarea.value.length);
                    }
                }
            }
        }

        function postReply(parentId){
            if(!currentUser){alert('Please log in.');return;}
            var textInput=document.getElementById('reply-text-'+parentId);if(!textInput)return;
            var rawText=textInput.value.trim();if(!rawText)return;
            var text=typeof sanitizeInput==='function'?sanitizeInput(rawText):escapeHTML(rawText);
            var bad=['fuck','shit','ass','bitch','cunt','dick','porn','nude','sex','violence','kill','murder','rape'];
            var flagged=bad.some(w=>rawText.toLowerCase().indexOf(w)!==-1);
            db.collection('comments').add({storyId:currentStoryId,text:text,userId:currentUser.uid,authorName:currentUserData?currentUserData.name:'Someone',isAnonymous:false,parentId:parentId,createdAt:firebase.firestore.FieldValue.serverTimestamp(),likes:0,isPinned:false,approved:!flagged,flagged:flagged})
            .then(function(){return db.collection('comments').doc(parentId).update({replyCount:firebase.firestore.FieldValue.increment(1)});})
            .then(function(){
                textInput.value='';document.getElementById('reply-area-'+parentId).classList.remove('active');
                if(currentStory&&currentStory.userId!==currentUser.uid){addNotification(currentStory.userId,'comment',{storyId:currentStoryId});}
            }).catch(function(err){console.error('Reply error:',err);});
        }

        function postComment(parentId){
            if(!currentUser){alert('Please log in.');return;}
            var textInput=document.getElementById('commentText'),anonymousCheck=document.getElementById('commentAnonymous'),error=document.getElementById('commentError');
            if(!textInput)return;
            var rawText=textInput.value.trim(),text=typeof sanitizeInput==='function'?sanitizeInput(rawText):escapeHTML(rawText);
            error.textContent='';if(!text){error.textContent='Please write a comment.';return;}if(rawText.length>1000){error.textContent='Under 1000 characters.';return;}
            var btn=document.getElementById('commentSubmitBtn');if(btn){btn.disabled=true;btn.textContent='⏳ Posting...';}
            var bad=['fuck','shit','ass','bitch','cunt','dick','porn','nude','sex','violence','kill','murder','rape'];
            var flagged=bad.some(w=>rawText.toLowerCase().indexOf(w)!==-1);
            db.collection('comments').add({storyId:currentStoryId,text:text,userId:currentUser.uid,authorName:currentUserData?currentUserData.name:'Someone',isAnonymous:anonymousCheck?anonymousCheck.checked:false,parentId:parentId||null,createdAt:firebase.firestore.FieldValue.serverTimestamp(),likes:0,isPinned:false,approved:!flagged,flagged:flagged})
            .then(function(){return db.collection('stories').doc(currentStoryId).update({commentCount:firebase.firestore.FieldValue.increment(1)});})
            .then(function(){
                if(btn){btn.disabled=false;btn.textContent='💬 Post Comment';}
                textInput.value='';document.getElementById('commentCountDisplay').textContent='0';
                if(flagged)alert('⚠️ Sent for review.');
                if(currentStory&&currentStory.userId!==currentUser.uid){addNotification(currentStory.userId,'comment',{storyId:currentStoryId});}
            }).catch(function(err){error.textContent=err.message;if(btn){btn.disabled=false;btn.textContent='💬 Post Comment';}});
        }

        // ✅ TOGGLE like + notification: "Peter reacted with ❤️ to your comment"
        function likeComment(cid){
            if(!currentUser)return;
            if(commentLikeLocks[cid])return;commentLikeLocks[cid]=true;
            var btn=document.getElementById('like-btn-'+cid);if(btn)btn.disabled=true;
            
            var userLikeRef=db.collection('users').doc(currentUser.uid).collection('commentLikes').doc(cid);
            
            userLikeRef.get().then(function(likeDoc){
                if(likeDoc.exists){
                    return db.collection('comments').doc(cid).update({likes:firebase.firestore.FieldValue.increment(-1)}).then(function(){
                        return userLikeRef.delete();
                    }).then(function(){
                        var countSpan=document.getElementById('like-count-'+cid);
                        if(countSpan)countSpan.textContent=Math.max((parseInt(countSpan.textContent)||0)-1,0);
                        if(btn){btn.classList.remove('liked');btn.style.opacity='1';}
                        commentLikeLocks[cid]=false;if(btn)btn.disabled=false;
                    });
                } else {
                    return db.collection('comments').doc(cid).get().then(function(doc){
                        if(!doc.exists)throw new Error('Comment not found');
                        var data=doc.data();
                        return db.collection('comments').doc(cid).update({likes:firebase.firestore.FieldValue.increment(1)}).then(function(){
                            return userLikeRef.set({commentId:cid,timestamp:firebase.firestore.FieldValue.serverTimestamp()});
                        }).then(function(){
                            var countSpan=document.getElementById('like-count-'+cid);
                            if(countSpan)countSpan.textContent=(parseInt(countSpan.textContent)||0)+1;
                            if(btn){btn.classList.add('liked');btn.style.opacity='1';}
                            
                            // ✅ Notification: "Peter reacted with ❤️ to your comment"
                            if(data.userId&&data.userId!==currentUser.uid){
                                addNotification(data.userId,'comment_like',{
                                    commentId:cid,
                                    storyId:currentStoryId,
                                    reactorName:currentUserData?currentUserData.name:'Someone'
                                });
                            }
                            commentLikeLocks[cid]=false;if(btn)btn.disabled=false;
                        });
                    });
                }
            }).catch(function(err){
                console.error('Like error:',err);
                commentLikeLocks[cid]=false;if(btn)btn.disabled=false;
            });
        }

        function deleteComment(cid){
            if(!currentUser||!confirm('Delete this comment?'))return;
            db.collection('comments').doc(cid).get().then(function(doc){
                if(!doc.exists)return;
                var data=doc.data();
                var isCommentOwner=currentUser&&data.userId===currentUser.uid;
                var isStoryAuthor=currentUser&&currentStory&&currentStory.userId===currentUser.uid;
                var isAdmin=currentUserData&&currentUserData.isAdmin===true;
                if(!isCommentOwner&&!isStoryAuthor&&!isAdmin){alert('You cannot delete this comment.');return;}
                db.collection('comments').doc(cid).delete().catch(function(){});
            });
        }
        function pinComment(cid){if(!currentUserData||!currentUserData.isAdmin)return;db.collection('comments').doc(cid).get().then(function(d){if(!d.exists)return;return db.collection('comments').doc(cid).update({isPinned:!d.data().isPinned});}).catch(function(){});}
        function reportComment(cid,sid){if(!currentUser)return;var r=prompt('Reason?');if(!r||r.length<3)return;db.collection('reports').add({commentId:cid,storyId:sid,reportedBy:currentUser.uid,reporterName:currentUserData?currentUserData.name:'Anonymous',reason:r.trim(),status:'pending',type:'comment',createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){alert('✅ Reported');}).catch(function(){});}

        function reportThisStory(){if(!currentStory)return;var r=prompt('Reason?');if(!r||r.length<3)return;db.collection('reports').add({storyId:currentStory.id,reportedBy:currentUser.uid,reporterName:currentUserData?currentUserData.name:'Anonymous',reason:r.trim(),status:'pending',type:'story',createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){alert('✅ Reported');}).catch(function(e){alert('❌ '+e.message);});}
        function openEditStoryModal(){if(!currentStory||currentStory.userId!==currentUser.uid)return;currentEditId=currentStory.id;document.getElementById('editTitle').value=currentStory.title||'';document.getElementById('editContent').value=currentStory.text||'';document.getElementById('editError').textContent='';document.getElementById('editModal').classList.add('active');}
        function closeEditModal(){document.getElementById('editModal').classList.remove('active');currentEditId=null;}
        function saveEdit(){var t=document.getElementById('editTitle').value.trim(),c=document.getElementById('editContent').value.trim();if(!t||!c){document.getElementById('editError').textContent='Required.';return;}db.collection('stories').doc(currentEditId).update({title:t,text:c,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){closeEditModal();alert('✅ Updated!');loadStory();}).catch(function(e){document.getElementById('editError').textContent=e.message;});}
        function deleteCurrentStory(){if(!currentUser||!currentStory||!confirm('⚠️ Delete?'))return;db.collection('stories').doc(currentStory.id).delete().then(function(){alert('✅ Deleted');window.location.href='index.html';}).catch(function(e){alert('❌ '+e.message);});}
        function toggleStoryVisibility(){if(!currentStory||currentStory.userId!==currentUser.uid)return;var newVis=currentStory.visibility==='public'?'private':'public';db.collection('stories').doc(currentStory.id).update({visibility:newVis}).then(function(){currentStory.visibility=newVis;loadStory();}).catch(function(e){alert('❌ '+e.message);});}

        function openGoldDonation(storyId){
            if(!currentUser)return;if(!currentUserData)return;
            var b=currentUserData.goldBalance||0;
            if(b<1){alert('No gold!');return;}
            document.getElementById('goldBalanceAmount').textContent=b;
            document.getElementById('goldModal').classList.add('active');
            currentStoryId=storyId;window.selectedGoldAmount=0;
            document.getElementById('customGoldAmount').value='';
            document.getElementById('goldMessage').value='';
            document.getElementById('goldError').textContent='';
            document.querySelectorAll('.gold-amount-btn').forEach(function(x){x.classList.remove('selected');});
        }
        function closeGoldModal(){document.getElementById('goldModal').classList.remove('active');}
        function selectGoldAmount(a){window.selectedGoldAmount=a;document.getElementById('customGoldAmount').value=a;document.querySelectorAll('.gold-amount-btn').forEach(function(x){x.classList.remove('selected');});if(event&&event.target)event.target.classList.add('selected');}
        
        // ✅ Gold donation — calls donateGold from gold.js
        function confirmGoldDonation(){
            var ci=document.getElementById('customGoldAmount'),mi=document.getElementById('goldMessage'),ed=document.getElementById('goldError'),a=window.selectedGoldAmount;
            if(ci&&ci.value){var c=parseInt(ci.value);if(c>0)a=c;}
            var b=currentUserData?currentUserData.goldBalance||0:0;
            if(!a||a<1){ed.textContent='Enter amount.';return;}
            if(a>b){ed.textContent='Not enough! Balance: '+b;return;}
            var msg=mi?mi.value.trim():'';closeGoldModal();
            if(typeof donateGold==='function'){
                donateGold(currentStoryId,a,msg);
            } else {
                alert('Gold system loading...');
            }
        }

        window.addEventListener('beforeunload',function(){sessionStorage.setItem('feedScrollPos',window.scrollY);sessionStorage.setItem('feedCategory',currentCategory||'all');});

        document.addEventListener('DOMContentLoaded',function(){
            applyGuestRestrictions();
            var check=setInterval(function(){if(typeof currentUser!=='undefined'){clearInterval(check);loadStory();}},100);
            if(typeof auth!=='undefined')auth.onAuthStateChanged(function(){applyGuestRestrictions();loadStory();});
            document.getElementById('commentText')?.addEventListener('input',function(){document.getElementById('commentCountDisplay').textContent=this.value.length;});
            document.getElementById('authModal')?.addEventListener('click',function(e){if(e.target===this)closeModal();});
            document.getElementById('editModal')?.addEventListener('click',function(e){if(e.target===this)closeEditModal();});
            document.getElementById('goldModal')?.addEventListener('click',function(e){if(e.target===this)closeGoldModal();});
            document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeEditModal();closeGoldModal();}});
            console.log('✅ Story page ready (all fixes applied)');
        });
    </script>
