        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();

    <style>
        .profile-container { max-width: 680px; margin: 0 auto; padding: 1.5rem 0; }
        .profile-card { background: var(--bg-card); border-radius: var(--radius-xl); padding: 2rem; border: 1px solid var(--border-color); text-align: center; box-shadow: var(--shadow-sm); margin-bottom: 1.5rem; }
        .avatar-section { position: relative; display: inline-block; margin-bottom: 12px; }
        .avatar-border { width: 100px; height: 100px; border-radius: 50%; padding: 3px; display: inline-block; transition: all 0.3s ease; }
        .avatar-border.default { background: linear-gradient(135deg, var(--primary), var(--secondary), var(--primary-light)); }
        .avatar-border.gold { background: linear-gradient(135deg, #f1c40f, #f39c12); }
        .avatar-border.rainbow { background: linear-gradient(135deg, #ff6b6b, #feca57, #54a0ff, #5f27cd); }
        .avatar-border.dark { background: linear-gradient(135deg, #2d3436, #636e72); }
        .avatar-border.neon { background: linear-gradient(135deg, #00d2d3, #54a0ff); }
        .avatar-border.ocean { background: linear-gradient(135deg, #0077b6, #00b4d8); }
        .avatar-border.cosmic { background: linear-gradient(135deg, #6c5ce7, #fd79a8); }
        .avatar-border.wood { background: linear-gradient(135deg, #8B6B4A, #A0522D); }
        .avatar-border.fifa { background: linear-gradient(135deg, #f39c12, #e74c3c, #2ecc71, #3498db); }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 2.8rem; }
        .profile-name { font-size: 1.6rem; font-weight: 700; color: var(--text-primary); margin-top: 4px; }
        .profile-bio { color: var(--text-secondary); font-size: 0.85rem; margin: 2px 0; }
        .profile-meta { color: var(--text-muted); font-size: 0.78rem; }
        .customize-toggle { display: inline-block; margin-top: 8px; padding: 6px 18px; border: 1px solid var(--border-color); border-radius: 9999px; background: var(--bg-secondary); cursor: pointer; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); transition: all 0.2s; font-family: inherit; }
        .customize-toggle:hover { background: var(--border-color); }
        .customize-toggle.active { background: var(--primary); color: white; border-color: var(--primary); }
        .customize-panel { display: none; margin-top: 12px; padding: 14px; background: var(--bg-secondary); border-radius: var(--radius-lg); border: 1px solid var(--border-color); }
        .customize-panel.show { display: block; }
        .customize-panel h4 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px; }
        .avatar-selector { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .avatar-option { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid var(--border-color); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; background: var(--bg-card); transition: all 0.15s; }
        .avatar-option:hover { transform: scale(1.12); border-color: var(--secondary); }
        .avatar-option.active { border-color: var(--primary); box-shadow: 0 0 12px rgba(26,74,74,0.25); }
        .border-selector { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
        .border-option { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
        .border-option:hover { transform: scale(1.15); }
        .border-option.active { border-color: var(--primary); box-shadow: 0 0 10px rgba(26,74,74,0.3); }
        .border-option.default { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .border-option.gold { background: linear-gradient(135deg, #f1c40f, #f39c12); }
        .border-option.rainbow { background: linear-gradient(135deg, #ff6b6b, #54a0ff); }
        .border-option.dark { background: linear-gradient(135deg, #2d3436, #636e72); }
        .border-option.neon { background: linear-gradient(135deg, #00d2d3, #54a0ff); }
        .border-option.ocean { background: linear-gradient(135deg, #0077b6, #00b4d8); }
        .border-option.cosmic { background: linear-gradient(135deg, #6c5ce7, #fd79a8); }
        .border-option.wood { background: linear-gradient(135deg, #8B6B4A, #A0522D); }
        .border-option.fifa { background: linear-gradient(135deg, #f39c12, #2ecc71); }
        .badge-row { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin: 8px 0; }
        .admin-badge { background: var(--secondary); color: white; padding: 3px 14px; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; }
        .privacy-badge { padding: 3px 14px; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
        .privacy-badge.public { background: #dcfce7; color: #16a34a; }
        .privacy-badge.private { background: #fef3c7; color: #d97706; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 8px; margin: 16px 0; padding: 14px; background: var(--bg-secondary); border-radius: var(--radius-lg); border: 1px solid var(--border-color); }
        .stat-item { text-align: center; }
        .stat-item .num { font-size: 1.3rem; font-weight: 700; color: var(--text-primary); }
        .stat-item .lbl { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
        .stat-item.clickable { cursor: pointer; transition: all 0.15s; border-radius: var(--radius-md); padding: 4px; }
        .stat-item.clickable:hover { background: var(--border-color); }
        .stat-item.clickable .num { color: var(--primary); }
        .action-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-color); }
        .follow-btn { padding: 0.45rem 1.3rem; border: none; border-radius: 9999px; font-weight: 600; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .follow-btn.follow { background: var(--primary); color: white; }
        .follow-btn.follow:hover { background: var(--primary-light); transform: translateY(-1px); }
        .follow-btn.unfollow { background: var(--danger); color: white; }
        .follow-btn.unfollow:hover { background: #b91c1c; transform: translateY(-1px); }
        .stories-section { margin-top: 1.5rem; }
        .stories-section h3 { color: var(--text-primary); margin-bottom: 12px; font-size: 1.1rem; font-weight: 600; }
        .story-item { background: var(--bg-card); padding: 12px 16px; border-radius: var(--radius-md); border: 1px solid var(--border-color); margin-bottom: 6px; cursor: pointer; transition: all 0.15s; }
        .story-item:hover { border-color: var(--secondary); transform: translateX(2px); }
        .story-item .stitle { font-weight: 700; color: var(--text-primary); font-size: 0.95rem; }
        .story-item .smeta { font-size: 0.7rem; color: var(--text-muted); display: flex; gap: 8px; flex-wrap: wrap; margin: 2px 0 4px; }
        .story-item .smeta .scat { background: var(--bg-secondary); padding: 1px 8px; border-radius: 20px; font-weight: 600; }
        .story-item .stext { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; }
        .user-list-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .user-list-modal.active { display: flex; }
        .user-list-content { background: var(--bg-card); padding: 1.5rem; border-radius: var(--radius-lg); max-width: 400px; width: 92%; max-height: 70vh; overflow-y: auto; border: 1px solid var(--border-color); }
        .user-list-content h3 { margin-bottom: 12px; color: var(--text-primary); }
        .user-list-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s; }
        .user-list-item:hover { background: var(--bg-secondary); }
        .user-list-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
        .user-list-name { font-weight: 600; color: var(--text-primary); font-size: 0.9rem; }
        .user-list-close { float: right; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-muted); }
        .private-hidden { display: none; }
        @media (max-width: 480px) { .profile-card { padding: 1.2rem 1rem; } .avatar-border { width: 80px; height: 80px; } .avatar-img { font-size: 2.2rem; } .profile-name { font-size: 1.3rem; } .stats-row { grid-template-columns: repeat(3, 1fr); } .avatar-option { width: 30px; height: 30px; font-size: 1rem; } .border-option { width: 22px; height: 22px; } }
    </style>
</head>

<body>
    <header class="header" role="banner">
        <a href="index.html" class="logo" aria-label="Home">⚓ <span>The</span> Harbor</a>
        <div class="header-right">
            <a href="index.html" class="btn btn-ghost guest-only">🏠 Feed</a>
            <a href="about.html" class="btn btn-ghost">🌿 About</a>
            <a href="submit.html" class="btn btn-ghost guest-only">📝 Share</a>
            <a href="profile.html" class="btn btn-feed active guest-only" aria-current="page">👤 Profile</a>
            <a href="suggest.html" class="btn btn-ghost guest-only">💡 Suggest</a>
            <a href="activity.html" class="btn btn-ghost guest-only">📊 Activity</a>
            <a href="admin.html" class="btn btn-ghost guest-only" id="adminNavLink" style="display:none;">👑 Admin</a>
            <button class="btn-settings guest-only" onclick="toggleSidebar()" title="Settings">⚙️</button>
            <button class="btn btn-login auth-only" onclick="openModal('login')">🔐 Log In</button>
            <button class="btn btn-signup auth-only" onclick="openModal('signup')">📝 Join</button>
            <div id="userInfo" class="guest-only" style="display:none;align-items:center;gap:8px;flex-wrap:wrap;">
                <span id="userName">Friend</span>
                <span id="userGenderBadge" style="font-size:0.75rem;padding:2px 10px;border-radius:20px;background:var(--bg-secondary);color:var(--text-muted);"></span>

    <div id="emergencyBanner" role="alert"></div>

    <div class="container">
        <div class="profile-container">
            <div id="profileContent"><div class="loading"><div class="loading-spinner"></div> Loading profile...</div></div>
        </div>
    </div>

    <div class="user-list-modal" id="userListModal">

    <div class="modal" id="editProfileModal" role="dialog" aria-modal="true">

            <button class="modal-close" onclick="closeEditModal()" aria-label="Close">&times;</button>

            <label for="editName">Username</label><input type="text" id="editName" placeholder="Username" />

            <div id="editError" class="error-msg"></div><div id="editSuccess" class="success-msg"></div>
            <button class="btn-modal" onclick="saveProfile()">💾 Save Changes</button>

    </div>

    <div class="modal" id="authModal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
            <h2 id="modalTitle">🔐 Welcome Back</h2>
            <label for="authEmail">Email</label><input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email" />
            <label for="authPassword">Password</label><input type="password" id="authPassword" placeholder="•••••••• (min 6 chars)" autocomplete="current-password" />
            <div id="signupFields" style="display:none;">
                <label for="authName">Username</label><input type="text" id="authName" placeholder="Choose a username" autocomplete="username" />
                <label for="authCountry">Country</label><input type="text" id="authCountry" placeholder="Your country" autocomplete="country-name" />
                <div class="checkbox-group" style="display:flex;align-items:center;gap:10px;margin:12px 0;position:relative;z-index:10;">
                    <input type="checkbox" id="termsCheckbox" style="width:20px;height:20px;cursor:pointer;flex-shrink:0;accent-color:var(--primary);" />
                    <label for="termsCheckbox" style="font-weight:500;font-size:0.9rem;cursor:pointer;user-select:none;">
                        I agree to the <a href="terms.html" target="_blank" style="color:var(--primary);text-decoration:underline;">Terms</a> and <a href="privacy.html" target="_blank" style="color:var(--primary);text-decoration:underline;">Privacy Policy</a> <span style="color:var(--danger);">*</span>
                    </label>
                </div>
            </div>
            <button class="btn-modal" id="authSubmitBtn" onclick="handleAuth()">🚀 Log In</button>
            <div class="switch-link" id="authSwitch" onclick="toggleAuthMode()">Don't have an account? <strong>Sign Up</strong></div>

    <footer class="footer" role="contentinfo">

            <div class="footer-links"><a href="about.html">About</a><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="emergency.html">Emergency</a></div>
            <div class="footer-copy">© 2026 The Harbor — Built with ❤️ for the community.</div>
        </div>
    </footer>

    <script>
    var selectedAvatar = '👤';
    var selectedBorder = 'default';
    var profileFollowers = [];
    var profileFollowing = [];
    var currentProfileIsPrivate = false;

    function applyGuestRestrictions() {
        var isLoggedIn = (typeof currentUser !== 'undefined' && currentUser !== null && currentUser !== false);
        document.querySelectorAll('.guest-only').forEach(function(el) { el.style.display = isLoggedIn ? '' : 'none'; });
        document.querySelectorAll('.auth-only').forEach(function(el) { el.style.display = isLoggedIn ? 'none' : ''; });
        var ui = document.getElementById('userInfo'); if (ui) ui.style.display = isLoggedIn ? 'flex' : 'none';
    }

    // FIXED: Follow/Unfollow with instant UI update
    function profileFollowUser(targetUid) {
        if (!currentUser) { alert('Please log in.'); return; }
        if (targetUid === currentUser.uid) { alert('You cannot follow yourself.'); return; }
        
        var btn = document.querySelector('.follow-btn');
        var wasFollowing = isFollowingUser(targetUid);
        
        // Update UI instantly
        if (btn) {
            if (wasFollowing) {
                btn.textContent = 'Follow';
                btn.className = 'follow-btn follow';
            } else {
                btn.textContent = 'Unfollow';
                btn.className = 'follow-btn unfollow';
            }
            btn.disabled = true;
        }
        
        // Update local data instantly
        if (wasFollowing) {
            currentUserData.following = (currentUserData.following || []).filter(function(uid) { return uid !== targetUid; });
        } else {
            if (!currentUserData.following) currentUserData.following = [];
            currentUserData.following.push(targetUid);
        }
        
        // Call app.js followUser
        if (typeof followUser === 'function') {
            followUser(targetUid);
        }
        
        // Reload after short delay
        setTimeout(function() { loadProfile(); }, 500);
    }

    function isFollowingUser(targetUid) {
        if (!currentUserData) return false;
        return currentUserData.following && currentUserData.following.includes(targetUid);
    }

    function profileReportUser(userId) {
        if (!currentUser) { alert('Please log in.'); return; }
        if (userId === currentUser.uid) { alert('You cannot report yourself.'); return; }
        var reason = prompt('Why are you reporting this user?');
        if (!reason || reason.trim().length < 3) return;
        db.collection('reports').add({
            reportedUser: userId, reportedBy: currentUser.uid,
            reporterName: currentUserData ? currentUserData.name : 'Anonymous',
            reason: reason.trim(), status: 'pending', type: 'user',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(function() { alert('✅ Report submitted.'); }).catch(function(err) { alert('❌ ' + err.message); });
    }

    // FIXED: Toggle privacy with instant update
    function profileTogglePrivacy() {
        if (!currentUser) return;
        var newPrivacy = !currentProfileIsPrivate;
        var badge = document.querySelector('.privacy-badge');
        
        // Update UI instantly
        currentProfileIsPrivate = newPrivacy;
        if (badge) {
            badge.textContent = newPrivacy ? '🔒 Private' : '🌍 Public';
            badge.className = 'privacy-badge ' + (newPrivacy ? 'private' : 'public');
        }
        
        // Hide/show private sections
        var privateSections = document.querySelectorAll('.private-sensitive');
        privateSections.forEach(function(el) {
            el.style.display = newPrivacy ? 'none' : '';
        });
        
        // Update Firestore
        db.collection('users').doc(currentUser.uid).update({ isPublic: !newPrivacy })
            .then(function() {
                if (currentUserData) currentUserData.isPublic = !newPrivacy;
                if (typeof updateSidebarData === 'function') updateSidebarData();
            })
            .catch(function(err) { alert('❌ ' + err.message); });
    }

    function showUserList(type) {
        var modal = document.getElementById('userListModal');
        var title = document.getElementById('userListTitle');
        var container = document.getElementById('userListContainer');
        if (!modal || !container) return;
        var userIds = type === 'followers' ? profileFollowers : profileFollowing;
        title.textContent = type === 'followers' ? '👥 Followers' : '👤 Following';
        container.innerHTML = '<div class="loading"><div class="loading-spinner"></div> Loading...</div>';
        modal.classList.add('active');
        if (!userIds || userIds.length === 0) {
            container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">No users yet.</p>'; return;
        }
        var promises = userIds.map(function(uid) {
            return db.collection('users').doc(uid).get().then(function(doc) {
                if (doc.exists) { var d = doc.data(); d.uid = doc.id; return d; }
                return null;
            });
        });
        Promise.all(promises).then(function(users) {
            var valid = users.filter(function(u) { return u !== null; });
            if (valid.length === 0) { container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">No users found.</p>'; return; }
            container.innerHTML = valid.map(function(u) {
                var initial = (u.name || '?')[0].toUpperCase();
                return '<div class="user-list-item" onclick="closeUserList();window.location.href=\'profile.html?uid='+u.uid+'\'">'+
                    '<div class="user-list-avatar">'+initial+'</div>'+
                    '<div class="user-list-name">'+escapeHTML(u.name||'Unknown')+'</div></div>';
            }).join('');
        }).catch(function() { container.innerHTML = '<p style="color:var(--danger);text-align:center;padding:20px;">Error loading users.</p>'; });
    }

    function closeUserList() { document.getElementById('userListModal').classList.remove('active'); }

    function toggleCustomize() {
        var panel = document.getElementById('customizePanel');
        var btn = document.getElementById('customizeToggle');
        if (!panel || !btn) return;
        if (panel.classList.contains('show')) { panel.classList.remove('show'); btn.classList.remove('active'); btn.textContent = '🎨 Customize'; }
        else { panel.classList.add('show'); btn.classList.add('active'); btn.textContent = '✕ Close'; }
    }

    function loadProfile() {
        var container = document.getElementById('profileContent');
        if (!container) return;
        var urlParams = new URLSearchParams(window.location.search);
        var uid = urlParams.get('uid');
        if (uid && uid !== (auth.currentUser ? auth.currentUser.uid : null)) { loadUserProfile(uid, container); return; }
        if (!auth.currentUser) {
            container.innerHTML = '<div class="empty-state" style="padding:40px;background:var(--bg-card);border-radius:var(--radius-lg);border:1px solid var(--border-color);"><div class="big-emoji">🔒</div><h3>Login Required</h3><div style="margin-top:14px;display:flex;gap:10px;justify-content:center;"><button class="btn btn-primary" onclick="openModal(\'login\')">🔐 Log In</button><button class="btn btn-secondary" onclick="openModal(\'signup\')">📝 Join</button></div></div>';
            return;
        }
        currentUser = auth.currentUser;
        loadUserProfile(currentUser.uid, container);
    }

    function loadUserProfile(uid, container) {
        container.innerHTML = '<div class="loading"><div class="loading-spinner"></div> Loading profile...</div>';
        db.collection('users').doc(uid).get().then(function(doc) {
            if (!doc.exists) { container.innerHTML = '<div class="empty-state"><div class="big-emoji">👤</div><h3>Profile not found</h3><a href="index.html" class="btn btn-secondary" style="text-decoration:none;display:inline-block;margin-top:12px;">← Back to Home</a></div>'; return null; }
            var userData = doc.data();
            if (!userData.uid) userData.uid = doc.id;
            currentUserData = userData;
            selectedAvatar = userData.avatar || '👤';
            selectedBorder = userData.border || 'default';
            currentProfileIsPrivate = userData.isPublic === false;
            return db.collection('stories').where('userId','==',uid).get().then(function(snap) {
                var stories = [];
                var totalLikes = 0;
                snap.forEach(function(s) {
                    var sd = s.data(); sd.id = s.id;
                    var reactions = sd.reactions || {};
                    totalLikes += (reactions['❤️'] || 0);
                    if (sd.visibility === 'private' && uid !== (auth.currentUser ? auth.currentUser.uid : null)) return;
                    stories.push(sd);
                });
                stories.sort(function(a, b) { return (b.createdAt?.toDate().getTime()||0)-(a.createdAt?.toDate().getTime()||0); });
                return { userData: userData, stories: stories, totalLikes: totalLikes };
            });
        }).then(function(result) { if (result) renderProfile(result.userData, result.stories, result.totalLikes || 0); })
          .catch(function(err) { container.innerHTML = '<div class="empty-state"><div class="big-emoji">⚠️</div><h3>Error</h3><p>'+err.message+'</p><button class="btn btn-primary" onclick="loadProfile()">🔄 Retry</button></div>'; });
    }

    function renderProfile(userData, stories, totalLikes) {
        var container = document.getElementById('profileContent');
        var gender = userData.gender || '';
        var isAdmin = userData.isAdmin || false;
        var isPrivate = userData.isPublic === false;
        var isSelf = auth.currentUser && auth.currentUser.uid === userData.uid;
        var following = isFollowingUser(userData.uid);
        var time = userData.createdAt ? userData.createdAt.toDate().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : 'Recently';
        var borderClass = selectedBorder || 'default';
        var followers = userData.followers || [];
        var followingList = userData.following || [];
        profileFollowers = followers;
        profileFollowing = followingList;
        currentProfileIsPrivate = isPrivate;

        var followBtn = '';
        if (!isSelf && auth.currentUser) { 
            followBtn = '<button class="follow-btn '+(following?'unfollow':'follow')+'" onclick="profileFollowUser(\''+userData.uid+'\')">'+(following?'Unfollow':'Follow')+'</button>'; 
        }
        var reportBtn = '';
        if (!isSelf && auth.currentUser) { 
            reportBtn = '<button class="btn btn-ghost" onclick="profileReportUser(\''+userData.uid+'\')" style="color:var(--warning);">🚩 Report</button>'; 
        }

        // Privacy toggle button for own profile
        var privacyToggleBtn = '';
        if (isSelf) {
            privacyToggleBtn = '<button class="btn btn-ghost" onclick="profileTogglePrivacy()" style="color:'+(isPrivate?'var(--success)':'var(--warning)')+';margin-top:4px;">'+(isPrivate?'🌍 Make Public':'🔒 Make Private')+'</button>';
        }

        var storiesHtml = '';
        if (stories.length === 0) {
            storiesHtml = '<div class="empty-state" style="padding:20px;"><p style="color:var(--text-muted);">No stories to show.</p>'+(isSelf?'<a href="submit.html" class="btn btn-primary" style="text-decoration:none;display:inline-block;margin-top:10px;">📝 Write Your First Story</a>':'')+'</div>';
        } else {
            storiesHtml = stories.map(function(story) {
                var catNames = {men:"🧔 Men's Harbor",women:"👩 Women's Harbor",struggles:'🌊 The Storm',fun:'☀️ Sunny Skies',learning:'🧭 The Compass'};
                var st = story.createdAt ? story.createdAt.toDate().toLocaleDateString() : 'Recently';
                return '<div class="story-item" onclick="window.location.href=\'story.html?id='+story.id+'\'">'+
                    '<div class="stitle">'+escapeHTML(story.title)+'</div>'+
                    '<div class="smeta"><span class="scat">'+(catNames[story.category]||story.category)+'</span><span>📅 '+st+'</span><span>💬 '+(story.commentCount||0)+'</span>'+(story.isAnonymous?' 🕊️':'')+' '+(story.visibility==='private'?'🔒':'🌍')+'</div>'+
                    '<div class="stext">'+escapeHTML((story.text||'').substring(0,120))+((story.text||'').length>120?'...':'')+'</div></div>';
            }).join('');
        }

        container.innerHTML = '<div class="profile-card">'+
            '<div class="avatar-section"><div class="avatar-border '+borderClass+'" id="avatarBorder"><div class="avatar-img" id="avatarImg">'+selectedAvatar+'</div></div></div>'+
            '<h2 class="profile-name">'+escapeHTML(userData.name)+'</h2>'+
            '<div class="profile-bio private-sensitive">'+escapeHTML(gender)+' · 📍 '+escapeHTML(userData.country||'N/A')+'</div>'+
            '<div class="profile-bio private-sensitive">❤️ '+escapeHTML(userData.favorites||'Not specified')+'</div>'+
            '<div class="profile-meta">Member since '+time+'</div>'+
            '<div class="badge-row">'+(isAdmin?'<span class="admin-badge">👑 Admin</span>':'')+'<span class="privacy-badge '+(isPrivate?'private':'public')+'">'+(isPrivate?'🔒 Private':'🌍 Public')+'</span></div>'+
            privacyToggleBtn+
            (isSelf ? '<button class="customize-toggle" id="customizeToggle" onclick="toggleCustomize()">🎨 Customize</button>' : '')+
            (isSelf ? '<div class="customize-panel" id="customizePanel"><h4>Choose Avatar</h4><div class="avatar-selector" id="avatarSelector"></div><h4 style="margin-top:10px;">Choose Border</h4><div class="border-selector" id="borderSelector"></div></div>' : '')+
            '<div class="stats-row">'+
                '<div class="stat-item"><div class="num">'+stories.length+'</div><div class="lbl">📝 Stories</div></div>'+
                '<div class="stat-item clickable" onclick="showUserList(\'followers\')"><div class="num">'+followers.length+'</div><div class="lbl">👥 Followers</div></div>'+
                '<div class="stat-item clickable" onclick="showUserList(\'following\')"><div class="num">'+followingList.length+'</div><div class="lbl">👤 Following</div></div>'+
                (isSelf?'<div class="stat-item"><div class="num">'+(userData.goldBalance||0)+'</div><div class="lbl">🪙 Gold</div></div>':'')+
                '<div class="stat-item"><div class="num">'+(userData.goldReceived||0)+'</div><div class="lbl">💰 Received</div></div>'+
                '<div class="stat-item"><div class="num">'+(totalLikes||0)+'</div><div class="lbl">❤️ Likes</div></div>'+
            '</div>'+
            '<div class="action-row">'+followBtn+reportBtn+
                (isSelf?'<button class="btn btn-secondary" onclick="openEditModal()">✏️ Edit Profile</button>':'')+
                (isSelf?'<a href="delete-account.html" class="btn btn-ghost" style="color:var(--danger);text-decoration:none;">🗑️ Delete Account</a>':'')+
            '</div></div>'+
            '<div class="stories-section"><h3>📝 Stories ('+stories.length+')</h3>'+storiesHtml+'</div>'+
            '<div style="text-align:center;margin-top:20px;"><a href="index.html" class="btn btn-secondary" style="text-decoration:none;">← Back to Home</a></div>';

        // Hide sensitive info if private and viewer is not owner
        if (isPrivate && !isSelf) {
            var sensitive = document.querySelectorAll('.private-sensitive');
            sensitive.forEach(function(el) { el.style.display = 'none'; });
        }

        if (isSelf) {
            var maleAvatars = ['👨','🧑','👦','🧔','👨‍🦰','👨‍🦳','👨‍🦱','👨‍🦲','👴','🦸‍♂️','🧝‍♂️','🧙‍♂️'];
            var femaleAvatars = ['👩','👧','👩‍🦰','👩‍🦳','👩‍🦱','👩‍🦲','👵','🦸‍♀️','🧝‍♀️','🧙‍♀️','👸','🧚‍♀️'];
            var neutralAvatars = ['🧑','👤','🦸','🧝','🧙','🧚','🤖','👾','🎅','🤵','👰'];
            var avatars = gender==='🧔 Man'?maleAvatars:gender==='👩 Woman'?femaleAvatars:neutralAvatars;
            document.getElementById('avatarSelector').innerHTML = avatars.map(function(e) {
                return '<div class="avatar-option'+(selectedAvatar===e?' active':'')+'" onclick="selectAvatar(\''+e+'\')">'+e+'</div>';
            }).join('');
            var borders = ['default','gold','rainbow','dark','neon','ocean','cosmic','wood','fifa'];
            document.getElementById('borderSelector').innerHTML = borders.map(function(b) {
                return '<div class="border-option '+b+(selectedBorder===b?' active':'')+'" onclick="selectBorder(\''+b+'\')"></div>';
            }).join('');
        }
    }

    function selectAvatar(emoji) { selectedAvatar=emoji; document.getElementById('avatarImg').textContent=emoji; document.querySelectorAll('.avatar-option').forEach(function(el){el.classList.toggle('active',el.textContent.trim()===emoji);}); saveAvatarAndBorder(); }
    function selectBorder(borderId) { selectedBorder=borderId; document.getElementById('avatarBorder').className='avatar-border '+borderId; document.querySelectorAll('.border-option').forEach(function(el){el.classList.toggle('active',el.classList.contains(borderId));}); saveAvatarAndBorder(); }
    function saveAvatarAndBorder() { if(!currentUser)return; db.collection('users').doc(currentUser.uid).update({avatar:selectedAvatar,border:selectedBorder}).catch(function(){}); }

    function openEditModal() { var modal=document.getElementById('editProfileModal'); if(!modal||!currentUserData)return; document.getElementById('editName').value=currentUserData.name||''; document.getElementById('editFavorites').value=currentUserData.favorites||''; document.getElementById('editError').textContent=''; document.getElementById('editSuccess').textContent=''; modal.classList.add('active'); }
    function closeEditModal() { document.getElementById('editProfileModal').classList.remove('active'); }
    function saveProfile() { var name=document.getElementById('editName').value.trim(), fav=document.getElementById('editFavorites').value.trim(), err=document.getElementById('editError'), suc=document.getElementById('editSuccess'); err.textContent='';suc.textContent=''; if(!name||name.length<2){err.textContent='Username must be at least 2 characters.';return;} db.collection('users').doc(currentUser.uid).update({name:name,favorites:fav||'Not specified'}).then(function(){suc.textContent='✅ Profile updated!';currentUserData.name=name;currentUserData.favorites=fav;var ue=document.getElementById('userName');if(ue)ue.textContent=name;setTimeout(function(){closeEditModal();loadProfile();},1000);}).catch(function(e){err.textContent='❌ '+e.message;}); }

    document.addEventListener('DOMContentLoaded', function() {
        var check=setInterval(function(){if(typeof currentUser!=='undefined'){clearInterval(check);applyGuestRestrictions();loadProfile();}},100);
        if(typeof auth!=='undefined')auth.onAuthStateChanged(function(){setTimeout(function(){applyGuestRestrictions();loadProfile();},300);});
        document.getElementById('authModal')?.addEventListener('click',function(e){if(e.target===this)closeModal();});
        document.getElementById('editProfileModal')?.addEventListener('click',function(e){if(e.target===this)closeEditModal();});
        document.getElementById('userListModal')?.addEventListener('click',function(e){if(e.target===this)closeUserList();});
        document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeEditModal();closeUserList();}});
        console.log('✅ Profile page ready');
    });
    </script>
</body>
</html>
