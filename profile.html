<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile — The Harbor</title>

    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://www.gstatic.com https://*.firebaseio.com;
        style-src 'self' 'unsafe-inline';
        connect-src 'self' https://*.firebaseio.com https://*.googleapis.com;
    ">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>

    <link rel="stylesheet" href="css/style.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5efe6;
            color: #2d3a3a;
            padding: 20px;
            max-width: 960px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .container { max-width: 960px; margin: 0 auto; }
        .crisis-banner {
            background: #1a4a4a;
            color: #f5f0eb;
            padding: 12px 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            margin-bottom: 24px;
            border-left: 5px solid #c47a5a;
        }
        .crisis-banner a { color: #e8ddd0; font-weight: bold; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 16px 0;
            border-bottom: 2px solid #c47a5a;
            margin-bottom: 24px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo-icon { font-size: 2.2rem; }
        .logo-text { font-size: 1.8rem; font-weight: 300; color: #1a4a4a; }
        .logo-text span { font-weight: 700; color: #c47a5a; }
        .logo-sub { font-size: 0.75rem; color: #7a9e7e; font-style: italic; display: block; margin-top: -4px; }
        .auth-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-login {
            padding: 8px 24px;
            border: 2px solid #1a4a4a;
            border-radius: 30px;
            background: #e8ddd0;
            color: #1a4a4a;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-login:hover { background: #1a4a4a; color: #f5f0eb; }
        .btn-signup {
            padding: 8px 24px;
            border: none;
            border-radius: 30px;
            background: #1a4a4a;
            color: #f5f0eb;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-signup:hover { background: #c47a5a; }
        .btn-logout {
            padding: 6px 18px;
            border: none;
            border-radius: 30px;
            background: #c47a5a;
            color: #f5f0eb;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-logout:hover { background: #a85a3a; }
        .user-info {
            background: #f5f0eb;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #d4c8b8;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .user-name { font-weight: 700; color: #1a4a4a; }
        .user-gender-badge {
            background: #e8ddd0;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .btn-primary {
            background: #1a4a4a;
            color: #f5f0eb;
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-primary:hover { background: #c47a5a; transform: translateY(-2px); }
        .btn-secondary {
            background: #e8ddd0;
            color: #1a4a4a;
            padding: 10px 28px;
            border: 2px solid #1a4a4a;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-secondary:hover { background: #1a4a4a; color: #f5f0eb; }
        .footer {
            text-align: center;
            color: #a8a09a;
            font-size: 0.8rem;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #d4c8b8;
        }
        .card {
            background: #f5f0eb;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #d4c8b8;
        }
        .story-card {
            background: #f5f0eb;
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid #d4c8b8;
            margin-bottom: 12px;
        }
        .story-title { font-size: 1.1rem; font-weight: 700; color: #1a4a4a; }
        .story-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: #7a9e7e;
            margin: 4px 0 8px;
        }
        .category-badge {
            background: #e8ddd0;
            padding: 2px 14px;
            border-radius: 20px;
            color: #1a4a4a;
            font-weight: 600;
            font-size: 0.75rem;
        }
        .story-text { font-size: 0.95rem; color: #2d3a3a; line-height: 1.6; }
        .comment-link { color: #7a9e7e; text-decoration: none; font-weight: 600; cursor: pointer; }
        .comment-link:hover { color: #1a4a4a; }
        .loading { text-align: center; color: #7a9e7e; padding: 40px 0; }
        .empty-state { text-align: center; padding: 50px 20px; color: #7a9e7e; }
        .empty-state .big-emoji { font-size: 3rem; display: block; margin-bottom: 12px; }
        .empty-state h3 { color: #1a4a4a; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-content {
            background: #f5f0eb;
            padding: 32px;
            border-radius: 24px;
            max-width: 440px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #d4c8b8;
        }
        .modal-close { float: right; font-size: 1.8rem; cursor: pointer; color: #a8a09a; transition: 0.3s; }
        .modal-close:hover { color: #1a4a4a; }
        .modal-content h2 { font-weight: 300; color: #1a4a4a; margin-bottom: 20px; }
        .modal-content label { display: block; font-weight: 600; color: #2d3a3a; margin-top: 14px; font-size: 0.9rem; }
        .modal-content input, .modal-content select {
            width: 100%; padding: 12px;
            border: 2px solid #d4c8b8; border-radius: 10px;
            font-size: 1rem; margin-top: 4px;
            background: #ffffff; font-family: inherit;
            transition: 0.3s;
        }
        .modal-content input:focus, .modal-content select:focus { outline: none; border-color: #1a4a4a; }
        .modal-content .btn-modal {
            width: 100%; padding: 14px;
            background: #1a4a4a; color: #f5f0eb;
            border: none; border-radius: 30px;
            font-weight: 700; font-size: 1rem;
            cursor: pointer; margin-top: 18px;
            transition: 0.3s;
        }
        .modal-content .btn-modal:hover { background: #c47a5a; }
        .switch-link { text-align: center; margin-top: 16px; color: #7a9e7e; cursor: pointer; font-size: 0.9rem; }
        .switch-link:hover { color: #1a4a4a; text-decoration: underline; }
        .error-msg { color: #c0392b; font-size: 0.85rem; margin-top: 10px; text-align: center; }
        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: stretch; gap: 12px; }
            .auth-buttons { justify-content: center; }
            .logo-text { font-size: 1.4rem; }
            .card { padding: 16px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="crisis-banner">
            ⚠️ <strong>Peer support only.</strong> If you're in crisis, call <a href="https://988lifeline.org/" target="_blank">988 (US)</a>
        </div>

        <header class="header">
            <a href="index.html" class="logo">
                <span class="logo-icon">⚓</span>
                <div>
                    <span class="logo-text">The <span>Harbor</span></span>
                    <span class="logo-sub">My Profile</span>
                </div>
            </a>
            <div class="auth-buttons" id="authButtons">
                <button class="btn-login" onclick="openModal('login')">🔐 Log In</button>
                <button class="btn-signup" onclick="openModal('signup')">📝 Join</button>
            </div>
        </header>

        <div class="user-info" id="userInfo">
            👤 Welcome, <span class="user-name" id="userName">—</span>
            <span class="user-gender-badge" id="userGenderBadge"></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <div id="profileContent">
            <div class="loading">⏳ Loading profile...</div>
        </div>

        <div style="text-align:center;margin-top:20px;">
            <a href="index.html" class="btn-secondary" style="text-decoration:none;display:inline-block;">← Back to Home</a>
        </div>

        <footer class="footer">⚓ The Harbor &mdash; built with 💚 for the community</footer>
    </div>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">🔐 Welcome Back</h2>
            <label for="authEmail">Email</label>
            <input type="email" id="authEmail" placeholder="you@example.com" />
            <label for="authPassword">Password</label>
            <input type="password" id="authPassword" placeholder="•••••••• (min 6 chars)" />
            <div id="passwordStrength"></div>
            <div id="signupFields" style="display:none;">
                <label for="authName">Username</label>
                <input type="text" id="authName" placeholder="Choose a unique username" />
                <div id="usernameStatus" style="font-size:0.85rem;margin-top:4px;"></div>
                <label for="authGender">Gender</label>
                <select id="authGender">
                    <option value="🧔 Man">🧔 Man</option>
                    <option value="👩 Woman">👩 Woman</option>
                    <option value="⚧️ Non-binary">⚧️ Non-binary</option>
                    <option value="🙅 Prefer not to say">🙅 Prefer not to say</option>
                </select>
                <label for="authCountry">Country</label>
                <select id="authCountry"><option value="">Select your country...</option></select>
                <label for="authFavorites">Favorite things</label>
                <input type="text" id="authFavorites" placeholder="Hiking, reading, fishing..." />
            </div>
            <button class="btn-modal" id="authSubmitBtn" onclick="handleAuth()">🚀 Log In</button>
            <div class="switch-link" id="authSwitch" onclick="toggleAuthMode()">
                Don't have an account? <strong>Sign Up</strong>
            </div>
            <div class="error-msg" id="authError"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBoYWOijOWqjd3d3_NAiSsiGmQ0HokaRGs",
            authDomain: "the-harbor-community.firebaseapp.com",
            projectId: "the-harbor-community",
            storageBucket: "the-harbor-community.firebasestorage.app",
            messagingSenderId: "634248505303",
            appId: "1:634248505303:web:4eb16e6a9f97903420cd92"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentUserData = null;

        const countries = [{ name: 'United States', emergency: '911' }, { name: 'United Kingdom', emergency: '999' },
            { name: 'Bangladesh', emergency: '999' }, { name: 'India', emergency: '112' }
        ];

        function sanitizeInput(text) { if (!text) return ''; const d = document.createElement('div');
            d.textContent = text; return d.textContent; }

        function escapeHTML(text) { if (!text) return ''; const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;',
                "'": '&#039;', '/': '&#x2F;', '`': '&#x60;', '=': '&#x3D;' }; return String(text).replace(/[&<>"'/`=]/g, function(
                m) { return map[m]; }); }

        function checkPasswordStrength(password) { let score = 0; if (password.length >= 8) score += 20; if (/[A-Z]/.test(
                password)) score += 20; if (/[a-z]/.test(password)) score += 20; if (/[0-9]/.test(password)) score += 20; if (
                /[!@#$%^&*(),.?":{}|<>]/.test(password)) score += 20; const common = ['password', '123456', 'qwerty',
                'abc123', 'letmein', 'welcome', 'admin'
            ]; if (!common.some(pwd => password.toLowerCase().includes(pwd))) score += 10; let strength = 'weak',
                color = '#c0392b'; if (score >= 90) { strength = 'very-strong';
                color = '#27ae60'; } else if (score >= 70) { strength = 'strong';
                color = '#2ecc71'; } else if (score >= 50) { strength = 'medium';
                color = '#f39c12'; } else if (score >= 30) { strength = 'weak';
                color = '#e67e22'; } else { strength = 'very-weak';
                color = '#c0392b'; } return { score, strength, color }; }

        function checkUsernameAvailability(username) {
            if (!username || username.length < 2) return Promise.resolve(false);
            return db.collection('users').where('name', '==', username).get().then(s => s.empty);
        }

        async function checkUsernameOnType() {
            const nameInput = document.getElementById('authName');
            const statusDiv = document.getElementById('usernameStatus');
            if (!nameInput || !statusDiv) return;
            const username = nameInput.value.trim();
            if (username.length < 2) { statusDiv.innerHTML = ''; return; }
            const available = await checkUsernameAvailability(username);
            statusDiv.innerHTML = available ?
                `<span style="color:#27ae60;">✅ Username available!</span>` :
                `<span style="color:#c0392b;">❌ Username taken</span>`;
        }

        function openModal(mode) {
            const modal = document.getElementById('authModal');
            if (!modal) return;
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const signupFields = document.getElementById('signupFields');
            const switchLink = document.getElementById('authSwitch');
            const error = document.getElementById('authError');
            if (error) error.textContent = '';
            document.getElementById('authEmail').value = '';
            document.getElementById('authPassword').value = '';
            document.getElementById('authName').value = '';
            document.getElementById('authFavorites').value = '';
            document.getElementById('passwordStrength').innerHTML = '';
            document.getElementById('usernameStatus').innerHTML = '';
            if (mode === 'login') {
                title.textContent = '🔐 Welcome Back';
                submitBtn.textContent = '🚀 Log In';
                signupFields.style.display = 'none';
                switchLink.innerHTML = `Don't have an account? <strong>Sign Up</strong>`;
                switchLink.dataset.mode = 'signup';
            } else {
                title.textContent = '📝 Join The Harbor';
                submitBtn.textContent = '🚀 Create Account';
                signupFields.style.display = 'block';
                const countrySelect = document.getElementById('authCountry');
                if (countrySelect && countrySelect.options.length <= 1) {
                    countries.forEach(c => { const opt = document.createElement('option');
                        opt.value = c.name;
                        opt.textContent = c.name;
                        countrySelect.appendChild(opt); });
                }
                switchLink.innerHTML = `Already have an account? <strong>Log In</strong>`;
                switchLink.dataset.mode = 'login';
            }
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('authModal').style.display = 'none'; }

        function toggleAuthMode() {
            const switchLink = document.getElementById('authSwitch');
            if (!switchLink) return;
            const mode = switchLink.dataset.mode;
            closeModal();
            setTimeout(() => openModal(mode), 200);
        }

        function handleAuth() {
            const emailInput = document.getElementById('authEmail');
            const passwordInput = document.getElementById('authPassword');
            const error = document.getElementById('authError');
            const submitBtn = document.getElementById('authSubmitBtn');
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            error.textContent = '';
            if (!email || !email.includes('@') || !email.includes('.')) { error.textContent =
                    'Please enter a valid email address.'; return; }
            if (!password || password.length < 6) { error.textContent = 'Password must be at least 6 characters.'; return; }
            const isLogin = submitBtn.textContent.includes('Log In');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Please wait...';
            if (isLogin) {
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        const user = userCredential.user;
                        if (!user.emailVerified) { error.textContent = '⚠️ Please verify your email first.';
                            auth.signOut();
                            submitBtn.disabled = false;
                            submitBtn.textContent = '🚀 Log In'; return; }
                        closeModal();
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Log In';
                    })
                    .catch((err) => { error.textContent = err.message;
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Log In'; });
            } else {
                const nameInput = document.getElementById('authName');
                const genderSelect = document.getElementById('authGender');
                const favoritesInput = document.getElementById('authFavorites');
                const countrySelect = document.getElementById('authCountry');
                const name = nameInput ? nameInput.value.trim() : '';
                const gender = genderSelect ? genderSelect.value : '🙅 Prefer not to say';
                const favorites = favoritesInput ? favoritesInput.value.trim() : '';
                const country = countrySelect ? countrySelect.value : '';
                if (!name || name.length < 2) { error.textContent = 'Please enter a username (minimum 2 characters).';
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 Create Account'; return; }
                if (!country) { error.textContent = 'Please select your country.';
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 Create Account'; return; }
                checkUsernameAvailability(name)
                    .then((available) => {
                        if (!available) { error.textContent = '❌ Username is already taken.';
                            submitBtn.disabled = false;
                            submitBtn.textContent = '🚀 Create Account'; return Promise.reject('Username taken'); }
                        return auth.createUserWithEmailAndPassword(email, password);
                    })
                    .then((userCredential) => {
                        const user = userCredential.user;
                        return user.sendEmailVerification().then(() => user);
                    })
                    .then((user) => {
                        const countryData = countries.find(c => c.name === country);
                        return db.collection('users').doc(user.uid).set({
                            name: name,
                            email: email,
                            gender: gender,
                            favorites: favorites || 'Not specified',
                            country: country,
                            emergencyNumber: countryData?.emergency || '911',
                            emailVerified: false,
                            isAdmin: false,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            lastActive: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    })
                    .then(() => {
                        closeModal();
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Create Account';
                        auth.signOut();
                        alert('✅ Verification email sent! Please check your inbox.');
                    })
                    .catch((err) => {
                        if (err !== 'Username taken') { error.textContent = err.message; }
                        submitBtn.disabled = false;
                        submitBtn.textContent = '🚀 Create Account';
                    });
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) { auth.signOut();
                window.location.href = 'index.html'; }
        }

        auth.onAuthStateChanged((user) => {
            const authButtons = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            const userName = document.getElementById('userName');
            const userGenderBadge = document.getElementById('userGenderBadge');
            if (user) {
                currentUser = user;
                authButtons.style.display = 'none';
                userInfo.style.display = 'flex';
                db.collection('users').doc(user.uid).get()
                    .then((doc) => {
                        if (doc.exists) {
                            currentUserData = doc.data();
                            userName.textContent = currentUserData.name || 'Friend';
                            userGenderBadge.textContent = currentUserData.gender || '';
                            loadProfile();
                        }
                    })
                    .catch((err) => console.error('Error fetching user data:', err));
            } else {
                currentUser = null;
                currentUserData = null;
                authButtons.style.display = 'flex';
                userInfo.style.display = 'none';
                const content = document.getElementById('profileContent');
                if (content) {
                    content.innerHTML =
                        `<div class="empty-state"><div class="big-emoji">🔐</div><h3>Please Log In</h3><p>You need to be logged in to view your profile.</p><button class="btn-primary" onclick="openModal('login')" style="margin-top:12px;">Log In</button></div>`;
                }
            }
        });

        function loadProfile() {
            if (!currentUser) return;
            const content = document.getElementById('profileContent');
            content.innerHTML = '<div class="loading">⏳ Loading profile...</div>';
            db.collection('users').doc(currentUser.uid).get()
                .then((doc) => {
                    if (!doc.exists) { content.innerHTML =
                        '<div class="empty-state"><h3>Profile not found</h3></div>'; return; }
                    const userData = doc.data();
                    return db.collection('stories').where('userId', '==', currentUser.uid).where('approved', '==', true)
                        .get()
                        .then((storiesSnapshot) => {
                            const stories = [];
                            storiesSnapshot.forEach((s) => { stories.push(s.data()); });
                            return { userData, stories };
                        });
                })
                .then((result) => {
                    const { userData, stories } = result;
                    let html = `
                        <div class="card" style="text-align:center;">
                            <span style="font-size:4rem;">👤</span>
                            <h2 style="color:#1a4a4a;">${escapeHTML(userData.name)}</h2>
                            <p style="color:#7a9e7e;">${escapeHTML(userData.gender || '')}</p>
                            <p style="color:#7a9e7e;">📍 ${escapeHTML(userData.country || 'Not specified')}</p>
                            <p style="color:#7a9e7e;font-size:0.9rem;">❤️ ${escapeHTML(userData.favorites || 'Not specified')}</p>
                            <p style="color:#a8a09a;font-size:0.8rem;">Member since ${userData.createdAt ? userData.createdAt.toDate().toLocaleDateString() : 'Recently'}</p>
                            ${userData.isAdmin ? '<p style="color:#c47a5a;font-weight:700;">👑 Admin</p>' : ''}
                        </div>
                    `;
                    html +=
                        `<div style="margin-top:24px;"><h3 style="color:#1a4a4a;">📝 Your Stories (${stories.length})</h3>`;
                    if (stories.length === 0) {
                        html +=
                            `<div class="empty-state" style="padding:20px;"><p>You haven't shared any stories yet.</p><a href="submit.html" class="btn-primary" style="display:inline-block;text-decoration:none;margin-top:10px;">📝 Write Your First Story</a></div>`;
                    } else {
                        stories.forEach((story) => {
                            const categoryNames = { 'men': '🧔 Men\'s Harbor', 'women': '👩 Women\'s Harbor',
                                'struggles': '🌊 The Storm', 'fun': '☀️ Sunny Skies',
                                'learning': '🧭 The Compass' };
                            const categoryDisplay = categoryNames[story.category] || story.category;
                            const time = story.createdAt ? story.createdAt.toDate().toLocaleDateString() :
                                'Recently';
                            html += `
                                <div class="story-card">
                                    <div class="story-title">${escapeHTML(story.title)}</div>
                                    <div class="story-meta">
                                        <span class="category-badge">${categoryDisplay}</span>
                                        <span>📅 ${time}</span>
                                        <span>💬 ${story.commentCount || 0} comments</span>
                                        ${story.isAnonymous ? '🕊️ Anonymous' : '👤 Public'}
                                    </div>
                                    <div class="story-text">${escapeHTML(story.text.substring(0, 150))}${story.text.length > 150 ? '...' : ''}</div>
                                    <div style="margin-top:8px;"><a href="story.html?id=${story.id}" class="comment-link">Read more →</a></div>
                                </div>
                            `;
                        });
                    }
                    html +=
                        `</div><div style="text-align:center;margin-top:24px;"><button class="btn-secondary" onclick="logout()" style="border-color:#c0392b;color:#c0392b;">🚪 Logout</button></div>`;
                    content.innerHTML = html;
                })
                .catch((err) => {
                    content.innerHTML =
                        `<div class="empty-state"><h3>Error loading profile</h3><p>${err.message}</p></div>`;
                });
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('authModal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
            document.getElementById('authPassword').addEventListener('input', function() {
                const pwd = this.value;
                const strengthDiv = document.getElementById('passwordStrength');
                if (!strengthDiv) return;
                if (pwd.length === 0) { strengthDiv.innerHTML = ''; return; }
                const result = checkPasswordStrength(pwd);
                strengthDiv.innerHTML =
                    `<div style="margin-top:6px;font-size:0.85rem;">Strength: <span style="color:${result.color};font-weight:700;">${result.strength}</span></div>`;
            });
            document.getElementById('authName').addEventListener('input', checkUsernameOnType);
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const modal = document.getElementById('authModal');
                    if (modal && modal.style.display === 'flex') handleAuth();
                }
            });
            if (window.location.pathname.includes('profile.html')) loadProfile();
            console.log('✅ Profile page ready');
        });
        console.log('👤 Profile page loaded');
    </script>
</body>
</html>
