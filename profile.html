<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile — The Harbor</title>

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://*.firebaseio.com https://www.googletagmanager.com https://www.google-analytics.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://www.google-analytics.com https://*.google-analytics.com; img-src 'self' data: https:;">

    <!-- Theme: Apply immediately -->
    <script>
    (function() {
        var savedTheme = localStorage.getItem('harbor_theme');
        if (!savedTheme) {
            savedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-81R2FX47H0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-81R2FX47H0');

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- App Scripts (NO comments.js - dead code removed) -->
    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/gold.js"></script>

    <link rel="stylesheet" href="css/style.css" />

    <style>
        /* ===== PROFILE PAGE STYLES ===== */
        .profile-container {
            max-width: 720px;
            margin: 0 auto;
            padding: 1.5rem 0;
        }
        .profile-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 2.5rem 2rem;
            border: 1px solid var(--border-color);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-sm);
        }
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary-light));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .profile-card:hover::before {
            opacity: 1;
        }
        .profile-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }

        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }
        .avatar-border {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            padding: 4px;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .avatar-border:hover {
            transform: scale(1.04);
            box-shadow: 0 0 28px rgba(26, 74, 74, 0.2);
        }
        .avatar-border.default { background: linear-gradient(135deg, var(--primary), var(--secondary), var(--primary-light)); }
        .avatar-border.gold { background: linear-gradient(135deg, #f1c40f, #f39c12, #f1c40f); }
        .avatar-border.rainbow { background: linear-gradient(135deg, #ff6b6b, #feca57, #54a0ff, #5f27cd, #ff9ff3); }
        .avatar-border.dark { background: linear-gradient(135deg, #2d3436, #636e72, #2d3436); }
        .avatar-border.neon { background: linear-gradient(135deg, #00d2d3, #54a0ff, #00d2d3); }
        .avatar-border.ocean { background: linear-gradient(135deg, #0077b6, #00b4d8, #0077b6); }
        .avatar-border.cosmic { background: linear-gradient(135deg, #6c5ce7, #fd79a8, #6c5ce7); }
        .avatar-border.wood { background: linear-gradient(135deg, #8B6B4A, #A0522D, #8B6B4A); }
        .avatar-border.fifa { background: linear-gradient(135deg, #f39c12, #e74c3c, #2ecc71, #3498db); }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            transition: transform 0.2s ease;
        }
        .avatar-img:active { transform: scale(0.95); }

        .profile-name {
            color: var(--text-primary);
            font-size: 1.7rem;
            font-weight: 700;
            margin-top: 4px;
            letter-spacing: -0.01em;
        }
        .profile-detail {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 3px 0;
        }
        .profile-member-since {
            color: var(--text-muted);
            font-size: 0.78rem;
            margin-top: 8px;
        }

        .admin-badge {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 3px 16px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 6px;
            letter-spacing: 0.02em;
        }
        .privacy-badge {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 6px;
        }
        .privacy-badge.public { background: #dcfce7; color: #16a34a; }
        .privacy-badge.private { background: #fef3c7; color: #d97706; }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin: 18px 0;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
        }
        .profile-stats .stat {
            text-align: center;
        }
        .profile-stats .stat .number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .profile-stats .stat .label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-top: 2px;
        }

        .profile-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .follow-btn {
            padding: 0.5rem 1.4rem;
            border: none;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.01em;
        }
        .follow-btn.follow { background: var(--primary); color: white; }
        .follow-btn.follow:hover { background: var(--primary-light); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(26,74,74,0.3); }
        .follow-btn.unfollow { background: var(--danger); color: white; }
        .follow-btn.unfollow:hover { background: #b91c1c; transform: translateY(-1px); }
        .follow-btn:active { transform: scale(0.96); }

        .avatar-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin: 10px 0;
        }
        .avatar-option {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 3px solid var(--border-color);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
        }
        .avatar-option:hover { transform: scale(1.12); border-color: var(--secondary); }
        .avatar-option.active { border-color: var(--primary); box-shadow: 0 0 18px rgba(26,74,74,0.25); transform: scale(1.1); }
        .avatar-option:active { transform: scale(0.9); }

        .border-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin: 8px 0;
        }
        .border-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 3px solid transparent;
        }
        .border-option:hover { transform: scale(1.15); }
        .border-option.active { border-color: var(--primary); transform: scale(1.1); box-shadow: 0 0 14px rgba(26,74,74,0.3); }
        .border-option.default { background: linear-gradient(135deg, var(--primary), var(--secondary), var(--primary-light)); }
        .border-option.gold { background: linear-gradient(135deg, #f1c40f, #f39c12, #f1c40f); }
        .border-option.rainbow { background: linear-gradient(135deg, #ff6b6b, #feca57, #54a0ff, #5f27cd, #ff9ff3); }
        .border-option.dark { background: linear-gradient(135deg, #2d3436, #636e72, #2d3436); }
        .border-option.neon { background: linear-gradient(135deg, #00d2d3, #54a0ff, #00d2d3); }
        .border-option.ocean { background: linear-gradient(135deg, #0077b6, #00b4d8, #0077b6); }
        .border-option.cosmic { background: linear-gradient(135deg, #6c5ce7, #fd79a8, #6c5ce7); }
        .border-option.wood { background: linear-gradient(135deg, #8B6B4A, #A0522D, #8B6B4A); }
        .border-option.fifa { background: linear-gradient(135deg, #f39c12, #e74c3c, #2ecc71, #3498db); }

        .profile-stories {
            margin-top: 24px;
        }
        .profile-stories h3 {
            color: var(--text-primary);
            margin-bottom: 14px;
            font-size: 1.15rem;
            font-weight: 600;
        }
        .story-item {
            background: var(--bg-card);
            padding: 14px 18px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            margin-bottom: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .story-item:hover {
            box-shadow: var(--shadow-sm);
            transform: translateX(3px);
            border-color: var(--secondary);
        }
        .story-item:active { transform: scale(0.99); }
        .story-item .title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .story-item .meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.72rem;
            color: var(--text-muted);
            margin: 3px 0 6px;
        }
        .story-item .category-badge {
            background: var(--bg-secondary);
            padding: 2px 10px;
            border-radius: 20px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.68rem;
            border: 1px solid var(--border-color);
        }
        .story-item .text {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .profile-card { padding: 1.8rem 1.2rem; }
            .avatar-border { width: 90px; height: 90px; }
            .avatar-img { font-size: 2.6rem; }
            .profile-name { font-size: 1.4rem; }
            .profile-stats { grid-template-columns: repeat(3, 1fr); padding: 12px; }
            .profile-stats .stat .number { font-size: 1.2rem; }
            .avatar-option { width: 36px; height: 36px; font-size: 1.3rem; }
            .border-option { width: 26px; height: 26px; }
        }
        @media (max-width: 480px) {
            .profile-card { padding: 1.2rem 0.8rem; }
            .avatar-border { width: 76px; height: 76px; }
            .avatar-img { font-size: 2.2rem; }
            .profile-name { font-size: 1.2rem; }
            .profile-stats { grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 10px; }
            .profile-actions { flex-direction: column; align-items: center; }
            .story-item { padding: 10px 12px; }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header" role="banner">
        <a href="index.html" class="logo" aria-label="The Harbor Home">⚓ <span>The</span> Harbor</a>
        <div class="header-right">
            <a href="index.html" class="btn btn-ghost guest-only">🏠 Feed</a>

    <div class="modal" id="authModal" role="dialog" aria-modal="true">

    <!-- Page Script -->
    <script>
    // ============================================
    // PROFILE PAGE - FULLY FIXED
    // Uses app.js for auth, db, currentUser, currentUserData
    // ============================================

    let selectedAvatar = '👤';
    let selectedBorder = 'default';
    let viewedUserUid = null;

    // ============================================
    // GUEST/AUTH UI TOGGLE
    // ============================================
    function applyGuestRestrictions() {
        var isLoggedIn = (typeof currentUser !== 'undefined' && currentUser !== null && currentUser !== false);
        var guestOnly = document.querySelectorAll('.guest-only');
        var authOnly = document.querySelectorAll('.auth-only');
        guestOnly.forEach(function(el) { el.style.display = isLoggedIn ? '' : 'none'; });
        authOnly.forEach(function(el) { el.style.display = isLoggedIn ? 'none' : ''; });
        var userInfo = document.getElementById('userInfo');
        if (userInfo) userInfo.style.display = isLoggedIn ? 'flex' : 'none';
    }

    // ============================================
    // FOLLOW USER (uses app.js followUser if available)
    // ============================================
    function profileFollowUser(targetUid) {
        if (!currentUser) { alert('Please log in to follow users.'); return; }
        if (targetUid === currentUser.uid) { alert('You cannot follow yourself.'); return; }
        if (typeof followUser === 'function') {
            followUser(targetUid);
        } else {
            alert('Follow system loading...');
        }
    }

    function isFollowingUser(targetUid) {
        if (!currentUserData) return false;
        return currentUserData.following && currentUserData.following.includes(targetUid);
    }

    // ============================================
    // REPORT USER
    // ============================================
    function profileReportUser(userId) {
        if (!currentUser) { alert('Please log in to report.'); return; }
        if (userId === currentUser.uid) { alert('You cannot report yourself.'); return; }
        if (typeof reportUser === 'function') {
            reportUser(userId);
        } else {
            var reason = prompt('Why are you reporting this user?');
            if (!reason || reason.trim().length < 3) { alert('Please provide a valid reason.'); return; }
            db.collection('reports').add({
                reportedUser: userId, reportedBy: currentUser.uid,
                reporterName: currentUserData ? currentUserData.name : 'Anonymous',
                reason: reason.trim(), status: 'pending', type: 'user',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(function() { alert('✅ Report submitted.'); })
              .catch(function(err) { alert('❌ Error: ' + err.message); });
        }
    }

    // ============================================
    // LOAD PROFILE
    // ============================================
    function loadProfile() {
        var container = document.getElementById('profileContent');
        if (!container) return;

        var urlParams = new URLSearchParams(window.location.search);
        var uid = urlParams.get('uid');

        if (uid && uid !== (auth.currentUser ? auth.currentUser.uid : null)) {
            viewedUserUid = uid;
            loadUserProfile(uid, container);
            return;
        }
        viewedUserUid = null;

        if (!auth.currentUser) {
            container.innerHTML = `
                <div class="empty-state" style="padding:40px;background:var(--bg-card);border-radius:var(--radius-lg);border:1px solid var(--border-color);">
                    <div class="big-emoji">🔒</div>
                    <h3>Login Required</h3>
                    <p style="color:var(--text-muted);">Please log in or join to view your profile.</p>
                    <div style="margin-top:16px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
                        <button class="btn btn-primary" onclick="openModal('login')">🔐 Log In</button>
                        <button class="btn btn-secondary" onclick="openModal('signup')">📝 Join</button>
                    </div>
                </div>`;
            return;
        }
        currentUser = auth.currentUser;
        loadUserProfile(currentUser.uid, container);
    }

    function loadUserProfile(uid, container) {
        container.innerHTML = '<div class="loading"><div class="loading-spinner"></div> Loading profile...</div>';

        db.collection('users').doc(uid).get()
            .then(function(doc) {
                if (!doc.exists) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="big-emoji">👤</div>
                            <h3>Profile not found</h3>
                            <p style="color:var(--text-muted);">This user profile does not exist.</p>
                            <a href="index.html" class="btn btn-secondary" style="text-decoration:none;display:inline-block;margin-top:12px;">← Back to Home</a>
                        </div>`;
                    return null;
                }
                var userData = doc.data();
                // FIX #5: Ensure uid is available (use document ID as fallback)
                if (!userData.uid) userData.uid = doc.id;
                currentUserData = userData;
                selectedAvatar = userData.avatar || '👤';
                selectedBorder = userData.border || 'default';
                viewedUserData = userData;

                return db.collection('stories').where('userId', '==', uid).get()
                    .then(function(snap) {
                        var stories = [];
                        snap.forEach(function(s) {
                            var sd = s.data();
                            sd.id = s.id;
                            // FIX #2: Privacy filter
                            if (sd.visibility === 'private' && uid !== (auth.currentUser ? auth.currentUser.uid : null)) return;
                            stories.push(sd);
                        });
                        stories.sort(function(a, b) {
                            var ta = a.createdAt ? a.createdAt.toDate().getTime() : 0;
                            var tb = b.createdAt ? b.createdAt.toDate().getTime() : 0;
                            return tb - ta;
                        });
                        return { userData: userData, stories: stories };
                    });
            })
            .then(function(result) {
                if (result) renderProfile(result.userData, result.stories);
            })
            .catch(function(err) {
                console.error('Profile load error:', err);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="big-emoji">⚠️</div>
                        <h3>Error Loading Profile</h3>
                        <p style="color:var(--text-muted);">${err.message}</p>
                        <button class="btn btn-primary" onclick="loadProfile()" style="margin-top:12px;">🔄 Retry</button>
                    </div>`;
            });
    }

    // ============================================
    // RENDER PROFILE
    // ============================================
    function renderProfile(userData, stories) {
        var container = document.getElementById('profileContent');
        var gender = userData.gender || '';
        var isAdmin = userData.isAdmin || false;
        var isPrivate = userData.isPublic === false;
        // FIX #5: Use auth.currentUser.uid directly, not userData.uid
        var isSelf = auth.currentUser && auth.currentUser.uid === userData.uid;
        var following = isFollowingUser(userData.uid);
        var time = userData.createdAt ? userData.createdAt.toDate().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : 'Recently';

        // Avatar options
        var maleAvatars = ['👨','🧑','👦','🧔','👨‍🦰','👨‍🦳','👨‍🦱','👨‍🦲','👴','🦸‍♂️','🧝‍♂️','🧙‍♂️'];
        var femaleAvatars = ['👩','👧','👩‍🦰','👩‍🦳','👩‍🦱','👩‍🦲','👵','🦸‍♀️','🧝‍♀️','🧙‍♀️','👸','🧚‍♀️'];
        var neutralAvatars = ['🧑','👤','🦸','🧝','🧙','🧚','🤖','👾','🎅','🤵','👰'];
        var avatarOptions = neutralAvatars;
        if (gender === '🧔 Man') avatarOptions = maleAvatars;
        else if (gender === '👩 Woman') avatarOptions = femaleAvatars;

        var avatarHtml = isSelf ? `
            <div style="margin-top:10px;">
                <div class="avatar-selector">
                    ${avatarOptions.map(function(e) {
                        return '<div class="avatar-option '+(selectedAvatar===e?'active':'')+'" onclick="selectAvatar(\''+e+'\')" title="'+e+'">'+e+'</div>';
                    }).join('')}
                </div>
                <div style="font-size:0.7rem;color:var(--text-muted);text-align:center;margin-top:4px;">👤 Click to change avatar</div>
            </div>` : '';

        var borderOptions = [
            {id:'default',label:'Default',cls:'default'},{id:'gold',label:'Gold',cls:'gold'},
            {id:'rainbow',label:'Rainbow',cls:'rainbow'},{id:'dark',label:'Dark',cls:'dark'},
            {id:'neon',label:'Neon',cls:'neon'},{id:'ocean',label:'Ocean',cls:'ocean'},
            {id:'cosmic',label:'Cosmic',cls:'cosmic'},{id:'wood',label:'Wood',cls:'wood'},
            {id:'fifa',label:'FIFA',cls:'fifa'}
        ];
        var borderHtml = isSelf ? `
            <div style="margin-top:6px;">
                <div class="border-selector">
                    ${borderOptions.map(function(b) {
                        return '<div class="border-option '+b.cls+' '+(selectedBorder===b.id?'active':'')+'" onclick="selectBorder(\''+b.id+'\')" title="'+b.label+'"></div>';
                    }).join('')}
                </div>
                <div style="font-size:0.7rem;color:var(--text-muted);text-align:center;margin-top:4px;">✨ Click to change border</div>
            </div>` : '';

        var borderClass = (borderOptions.find(function(b){return b.id===selectedBorder;}) || borderOptions[0]).cls;

        // Stats
        var storyCount = stories.length;
        var followerCount = userData.followers ? userData.followers.length : 0;
        var followingCount = userData.following ? userData.following.length : 0;
        var goldBalance = userData.goldBalance || 0;
        var goldReceived = userData.goldReceived || 0;
        var likesReceived = userData.likesReceived || 0;

        // Follow button (only for others)
        var followButton = '';
        if (!isSelf && auth.currentUser) {
            followButton = '<button class="follow-btn '+(following?'unfollow':'follow')+'" onclick="profileFollowUser(\''+userData.uid+'\')">'+(following?'Unfollow':'Follow')+'</button>';
        }

        // Report button (only for others)
        var reportButton = '';
        if (!isSelf && auth.currentUser) {
            reportButton = '<button class="btn btn-ghost" onclick="profileReportUser(\''+userData.uid+'\')" style="color:var(--warning);">🚩 Report</button>';
        }

        // Stories HTML
        var storiesHtml = '';
        if (stories.length === 0) {
            storiesHtml = '<div class="empty-state" style="padding:20px;"><p style="color:var(--text-muted);">No stories to show.</p>'+(isSelf?'<a href="submit.html" class="btn btn-primary" style="text-decoration:none;display:inline-block;margin-top:10px;">📝 Write Your First Story</a>':'')+'</div>';
        } else {
            storiesHtml = stories.map(function(story) {
                var catNames = {men:"🧔 Men's Harbor",women:"👩 Women's Harbor",struggles:'🌊 The Storm',fun:'☀️ Sunny Skies',learning:'🧭 The Compass'};
                var catDisp = catNames[story.category] || story.category;
                var st = story.createdAt ? story.createdAt.toDate().toLocaleDateString() : 'Recently';
                return '<div class="story-item" onclick="window.location.href=\'story.html?id='+story.id+'\'">'+
                    '<div class="title">'+escapeHTML(story.title)+'</div>'+
                    '<div class="meta"><span class="category-badge">'+catDisp+'</span><span>📅 '+st+'</span><span>💬 '+(story.commentCount||0)+' comments</span>'+(story.isAnonymous?' 🕊️ Anonymous':'')+' '+(story.visibility==='private'?'🔒 Private':'🌍 Public')+'</div>'+
                    '<div class="text">'+escapeHTML((story.text||'').substring(0,150))+((story.text||'').length>150?'...':'')+'</div></div>';
            }).join('');
        }

        // Render
        container.innerHTML = `
            <div class="profile-card">
                <div class="avatar-container">
                    <div class="avatar-border ${borderClass}" id="avatarBorder">
                        <div class="avatar-img" id="avatarImg">${selectedAvatar}</div>
                    </div>
                </div>
                ${borderHtml}
                ${avatarHtml}
                <h2 class="profile-name">${escapeHTML(userData.name)}</h2>
                <div class="profile-detail">${escapeHTML(gender)}</div>
                <div class="profile-detail">📍 ${escapeHTML(userData.country || 'Not specified')}</div>
                <div class="profile-detail">❤️ ${escapeHTML(userData.favorites || 'Not specified')}</div>
                <div class="profile-member-since">Member since ${time}</div>
                ${isAdmin ? '<div class="admin-badge">👑 Admin</div>' : ''}
                <div class="privacy-badge ${isPrivate?'private':'public'}">${isPrivate?'🔒 Private Profile':'🌍 Public Profile'}</div>
                <div class="profile-stats">
                    <div class="stat"><div class="number">${storyCount}</div><div class="label">📝 Stories</div></div>
                    <div class="stat"><div class="number">${followerCount}</div><div class="label">👥 Followers</div></div>
                    <div class="stat"><div class="number">${followingCount}</div><div class="label">👤 Following</div></div>
                    ${isSelf ? '<div class="stat"><div class="number">'+goldBalance+'</div><div class="label">🪙 Gold</div></div>' : ''}
                    <div class="stat"><div class="number">${goldReceived}</div><div class="label">💰 Gold Received</div></div>
                    <div class="stat"><div class="number">${likesReceived}</div><div class="label">❤️ Likes</div></div>
                </div>
                <div class="profile-actions">
                    ${followButton}
                    ${reportButton}
                    ${isSelf ? '<button class="btn btn-secondary" onclick="openEditModal()">✏️ Edit Profile</button>' : ''}
                    ${isSelf ? '<a href="delete-account.html" class="btn btn-ghost" style="color:var(--danger);text-decoration:none;">🗑️ Delete Account</a>' : ''}
                </div>
            </div>
            <div class="profile-stories">
                <h3>📝 Stories (${storyCount})</h3>
                ${storiesHtml}
            </div>
            <div style="text-align:center;margin-top:24px;">
                <a href="index.html" class="btn btn-secondary" style="text-decoration:none;">← Back to Home</a>
            </div>`;

        if (isSelf) saveAvatarAndBorder();
    }

    // ============================================
    // AVATAR & BORDER
    // ============================================
    function selectAvatar(emoji) {
        selectedAvatar = emoji;
        document.querySelectorAll('.avatar-option').forEach(function(el) {
            el.classList.toggle('active', el.textContent.trim() === emoji);
        });
        var img = document.getElementById('avatarImg');
        if (img) img.textContent = emoji;
        saveAvatarAndBorder();
    }
    function selectBorder(borderId) {
        selectedBorder = borderId;
        document.querySelectorAll('.border-option').forEach(function(el) {
            el.classList.toggle('active', el.classList.contains(borderId));
        });
        var borderMap = {default:'default',gold:'gold',rainbow:'rainbow',dark:'dark',neon:'neon',ocean:'ocean',cosmic:'cosmic',wood:'wood',fifa:'fifa'};
        var b = document.getElementById('avatarBorder');
        if (b) b.className = 'avatar-border '+(borderMap[borderId]||'default');
        saveAvatarAndBorder();
    }
    function saveAvatarAndBorder() {
        if (!currentUser) return;
        db.collection('users').doc(currentUser.uid).update({
            avatar: selectedAvatar,
            border: selectedBorder
        }).catch(function(err) {
            if (err.code === 'not-found') {
                db.collection('users').doc(currentUser.uid).set({avatar:selectedAvatar,border:selectedBorder},{merge:true}).catch(function(){});
            }
        });
    }

    // ============================================
    // EDIT PROFILE
    // ============================================
    function openEditModal() {
        var modal = document.getElementById('editProfileModal');
        if (!modal || !currentUserData) return;
        document.getElementById('editName').value = currentUserData.name || '';
        document.getElementById('editFavorites').value = currentUserData.favorites || '';
        document.getElementById('editError').textContent = '';
        document.getElementById('editSuccess').textContent = '';
        modal.classList.add('active');
    }
    function closeEditModal() {
        document.getElementById('editProfileModal').classList.remove('active');
    }
    function saveProfile() {
        var name = document.getElementById('editName').value.trim();
        var favorites = document.getElementById('editFavorites').value.trim();
        var errDiv = document.getElementById('editError');
        var sucDiv = document.getElementById('editSuccess');
        errDiv.textContent = ''; sucDiv.textContent = '';
        if (!name || name.length < 2) { errDiv.textContent = 'Username must be at least 2 characters.'; return; }
        if (name.length > 30) { errDiv.textContent = 'Username must be under 30 characters.'; return; }
        db.collection('users').doc(currentUser.uid).update({name:name,favorites:favorites||'Not specified'})
            .then(function() {
                sucDiv.textContent = '✅ Profile updated!';
                currentUserData.name = name;
                currentUserData.favorites = favorites || 'Not specified';
                var ue = document.getElementById('userName');
                if (ue) ue.textContent = name;
                setTimeout(function() { closeEditModal(); loadProfile(); }, 1200);
            })
            .catch(function(err) { errDiv.textContent = '❌ Error: ' + err.message; });
    }

    // ============================================
    // INIT
    // ============================================
    document.addEventListener('DOMContentLoaded', function() {
        // Wait for auth
        var check = setInterval(function() {
            if (typeof currentUser !== 'undefined') {
                clearInterval(check);
                applyGuestRestrictions();
                loadProfile();
            }
        }, 100);

        if (typeof auth !== 'undefined') {
            auth.onAuthStateChanged(function(user) {
                setTimeout(function() { applyGuestRestrictions(); loadProfile(); }, 300);
            });
        }

        // Modals
        document.getElementById('authModal')?.addEventListener('click', function(e) { if(e.target===this)closeModal(); });
        document.getElementById('editProfileModal')?.addEventListener('click', function(e) { if(e.target===this)closeEditModal(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { closeModal(); closeEditModal(); }
        });

        console.log('✅ Profile page ready');
    });
    </script>
</body>
</html>
