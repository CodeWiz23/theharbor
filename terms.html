<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome — The Harbor</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a4a4a, #2d6a6a);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }
        .welcome-container { text-align: center; color: #f5f0eb; z-index: 10; padding: 20px; }
        .welcome-container .emoji { font-size: 5rem; display: block; margin-bottom: 16px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .welcome-container h1 { font-size: 3rem; font-weight: 300; }
        .welcome-container h1 span { font-weight: 700; color: #c47a5a; }
        .welcome-container p { font-size: 1.1rem; opacity: 0.85; margin-top: 8px; }
        .btn-continue {
            display: inline-block; margin-top: 28px; padding: 14px 44px;
            background: #c47a5a; border: none; border-radius: 50px;
            color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer;
            text-decoration: none; transition: all 0.3s; box-shadow: 0 4px 20px rgba(196,122,90,0.4);
        }
        .btn-continue:hover { transform: scale(1.05); background: #a85a3a; }
        .star { position: fixed; width: 3px; height: 3px; background: white; border-radius: 50%; pointer-events: none; z-index: 0; }
        @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
        @media (max-width: 480px) { .welcome-container h1 { font-size: 2rem; } .welcome-container .emoji { font-size: 3.5rem; } }
    </style>
</head>

<body>
    <div id="stars"></div>

    <div class="welcome-container">
        <span class="emoji">🎉</span>
        <h1>Welcome to <span>The Harbor</span></h1>
        <p>⚓ A safe place to share, heal, and grow</p>
        <a href="index.html" class="btn-continue">Continue to The Harbor →</a>
    </div>

    <script>
    // Stars
    for (var i=0; i<80; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        s.style.cssText = 'left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation:twinkle '+(1.5+Math.random()*2)+'s infinite;animation-delay:'+Math.random()*3+'s;';
        document.getElementById('stars').appendChild(s);
    }

    // Fireworks
    function createFirework() {
        var colors = ['#ff6b6b','#feca57','#54a0ff','#5f27cd','#ff9ff3','#00d2d3','#ff9f43','#27ae60'];
        var cx = 50 + Math.random() * (window.innerWidth - 100);
        var cy = 20 + Math.random() * (window.innerHeight * 0.5);
        for (var i=0; i<30; i++) {
            var p = document.createElement('div');
            var angle = Math.random()*Math.PI*2;
            var dist = 50+Math.random()*150;
            p.style.cssText = 'position:fixed;width:'+(3+Math.random()*6)+'px;height:'+(3+Math.random()*6)+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';border-radius:50%;left:'+cx+'px;top:'+cy+'px;pointer-events:none;z-index:5;transition:all 1s ease-out;';
            document.body.appendChild(p);
            requestAnimationFrame(function(){ p.style.transform='translate('+Math.cos(angle)*dist+'px,'+Math.sin(angle)*dist+'px) scale(0)'; p.style.opacity='0'; });
            setTimeout(function(){ p.remove(); }, 1100);
        }
    }

    var interval = setInterval(function() { createFirework(); }, 600);
    setTimeout(function() { clearInterval(interval); }, 8000);

    document.addEventListener('click', function() { for(var i=0;i<3;i++) setTimeout(createFirework,i*80); });
    </script>
</body>
</html>
